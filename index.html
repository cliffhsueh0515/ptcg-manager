<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTCG 卡牌管理系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f4f4f6; --bg3: #e8e8ec;
      --text: #1a1a1a; --text2: #666; --text3: #aaa;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.20);
      --blue: #378ADD; --blue-dk: #185FA5; --blue-lt: #E6F1FB;
      --red: #E24B4A; --red-lt: #FCEBEB;
      --radius: 8px; --radius-lg: 14px;
      --sidebar: 300px; --topbar: 52px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#1c1c1e; --bg2:#2c2c2e; --bg3:#3a3a3c;
        --text:#f2f2f7; --text2:#aeaeb2; --text3:#636366;
        --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.20);
        --blue-lt:#1a3352; --red-lt:#3a1515;
      }
    }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:var(--bg2); color:var(--text); }

    /* ── AUTH ── */
    .auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .auth-card { background:var(--bg); border-radius:var(--radius-lg); border:0.5px solid var(--border);
                 padding:2.5rem 2rem; width:100%; max-width:360px; text-align:center; }
    .auth-logo { font-size:52px; margin-bottom:.75rem; }
    .auth-title { font-size:22px; font-weight:700; margin-bottom:.25rem; }
    .auth-sub { font-size:13px; color:var(--text2); margin-bottom:2rem; }
    .btn-google { width:100%; padding:12px; background:var(--bg); color:var(--text);
                  border:0.5px solid var(--border2); border-radius:var(--radius);
                  font-size:15px; font-weight:500; cursor:pointer;
                  display:flex; align-items:center; justify-content:center; gap:10px; }
    .btn-google:hover { background:var(--bg2); }
    .btn-google:disabled { opacity:.6; cursor:not-allowed; }
    .gico { width:20px; height:20px; flex-shrink:0; }
    .auth-err { background:var(--red-lt); color:var(--red); font-size:13px;
                padding:8px 12px; border-radius:var(--radius); margin-top:1rem; display:none; }
    .auth-err.show { display:block; }
    .auth-note { font-size:12px; color:var(--text2); margin-top:1.25rem; line-height:1.6; }

    /* ── APP SHELL ── */
    .app { display:none; flex-direction:column; height:100vh; overflow:hidden; }
    .app.on { display:flex; }

    /* Topbar */
    .topbar { height:var(--topbar); background:var(--bg); border-bottom:0.5px solid var(--border);
              display:flex; align-items:center; gap:10px; padding:0 1.25rem; flex-shrink:0; z-index:30; }
    .tb-title { font-size:16px; font-weight:700; flex:1; }
    .uinfo { display:flex; align-items:center; gap:8px; }
    .uav { width:28px; height:28px; border-radius:50%; object-fit:cover; }
    .uav-fb { width:28px; height:28px; border-radius:50%; background:var(--blue); color:white;
              font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; }
    .uname { font-size:13px; color:var(--text2); max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .btn-sm { padding:5px 12px; border:0.5px solid var(--border2); border-radius:var(--radius);
              background:none; color:var(--text2); font-size:12px; cursor:pointer; }
    .btn-sm:hover { background:var(--bg2); }

    /* Stats */
    .stats-bar { display:flex; background:var(--bg); border-bottom:0.5px solid var(--border);
                 flex-shrink:0; overflow-x:auto; }
    .si { padding:7px 18px; text-align:center; border-right:0.5px solid var(--border); white-space:nowrap; }
    .si:last-child { border-right:none; }
    .si-l { font-size:10px; color:var(--text2); margin-bottom:1px; }
    .si-v { font-size:17px; font-weight:700; }

    /* ── MAIN ── */
    .main { display:flex; flex:1; overflow:hidden; }

    /* LEFT */
    .lp { width:var(--sidebar); flex-shrink:0; display:flex; flex-direction:column;
          border-right:0.5px solid var(--border); background:var(--bg); overflow:hidden; }
    .lp-head { padding:10px; border-bottom:0.5px solid var(--border); flex-shrink:0; }
    .lp-head h2 { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase;
                  letter-spacing:.5px; margin-bottom:8px; }
    /* search */
    .sb { position:relative; margin-bottom:8px; }
    .sb input { width:100%; padding:8px 12px 8px 30px; border:0.5px solid var(--border2);
                border-radius:var(--radius); background:var(--bg2); color:var(--text);
                font-size:13px; outline:none; }
    .sb input:focus { border-color:var(--blue); background:var(--bg); }
    .sb-ico { position:absolute; left:9px; top:50%; transform:translateY(-50%);
              font-size:13px; color:var(--text3); pointer-events:none; }
    /* filter chips */
    .f-sec { margin-bottom:7px; }
    .f-sec-lbl { font-size:10px; color:var(--text3); margin-bottom:3px; text-transform:uppercase; letter-spacing:.5px; }
    .chips { display:flex; gap:4px; flex-wrap:wrap; }
    .chip { font-size:11px; padding:3px 8px; border:0.5px solid var(--border2); border-radius:20px;
            background:var(--bg); color:var(--text2); cursor:pointer; transition:all .12s; white-space:nowrap; }
    .chip.on, .chip:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-lt); }
    /* card list */
    .cl { flex:1; overflow-y:auto; }
    .cl-empty { padding:2rem 1rem; text-align:center; color:var(--text2); font-size:13px; }
    .cr { display:flex; align-items:center; gap:9px; padding:9px 10px;
          border-bottom:0.5px solid var(--border); cursor:pointer; transition:background .12s; }
    .cr:hover { background:var(--bg2); }
    .cr.sel { background:var(--blue-lt); border-left:3px solid var(--blue); }
    .cr.sel .cr-name { color:var(--blue); }
    /* card thumb in list */
    .cr-img { width:32px; height:44px; border-radius:3px; object-fit:cover; flex-shrink:0; background:var(--bg3); }
    .cr-img-ph { width:32px; height:44px; border-radius:3px; background:var(--bg3);
                 display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .cr-reg { width:24px; height:24px; border-radius:50%; background:var(--blue); color:white;
              font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .cr-info { flex:1; min-width:0; }
    .cr-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cr-meta { font-size:11px; color:var(--text2); margin-top:1px; }
    .cr-qb { min-width:22px; height:22px; border-radius:11px; background:var(--blue); color:white;
              font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 5px; flex-shrink:0; }
    .cr-qb.z { background:var(--bg3); color:var(--text3); }
    /* lp foot */
    .lp-foot { padding:8px 10px; border-top:0.5px solid var(--border); flex-shrink:0; }
    .btn-add { width:100%; padding:9px; background:var(--blue); color:white; border:none;
               border-radius:var(--radius); font-size:13px; font-weight:600; cursor:pointer; }
    .btn-add:hover { background:var(--blue-dk); }

    /* RIGHT */
    .rp { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg2); }
    .rp-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
                color:var(--text2); gap:10px; }
    .rp-empty-ico { font-size:52px; }
    .rp-empty-txt { font-size:15px; font-weight:500; }
    .rp-empty-sub { font-size:13px; color:var(--text3); }
    .rp-detail { flex:1; overflow-y:auto; padding:1.5rem; display:none; }
    .rp-detail.on { display:block; }
    .dc { background:var(--bg); border-radius:var(--radius-lg); border:0.5px solid var(--border);
          overflow:hidden; max-width:520px; margin:0 auto; }

    /* detail header */
    .dc-header { display:flex; gap:1rem; padding:1.25rem; border-bottom:0.5px solid var(--border); }
    .dc-img-wrap { flex-shrink:0; }
    .dc-img { width:100px; border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.15); display:block; cursor:pointer; transition:transform .15s; }
    .dc-img:hover { transform:scale(1.04); }
    .dc-img-ph { width:100px; height:140px; border-radius:8px; background:var(--bg3);
                 display:flex; align-items:center; justify-content:center; font-size:36px; }
    .dc-header-info { flex:1; min-width:0; padding-top:4px; }
    .dc-reg { width:32px; height:32px; border-radius:50%; background:var(--blue); color:white;
              font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
    .dc-name { font-size:20px; font-weight:700; margin-bottom:8px; }
    .dc-pills { display:flex; gap:5px; flex-wrap:wrap; }
    .pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:12px; font-size:11px; font-weight:500; }
    .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* qty */
    .dc-qty { padding:1.25rem; border-bottom:0.5px solid var(--border); }
    .qty-lbl { font-size:11px; color:var(--text2); margin-bottom:10px; text-transform:uppercase; letter-spacing:.4px; }
    .qty-ctrl { display:flex; align-items:center; gap:14px; }
    .qty-big-btn { width:46px; height:46px; border-radius:50%; border:0.5px solid var(--border2);
                   background:var(--bg2); color:var(--text); font-size:22px; cursor:pointer;
                   display:flex; align-items:center; justify-content:center; transition:all .12s; }
    .qty-big-btn:hover { background:var(--bg3); }
    .qty-big-btn.add:hover { background:var(--blue); color:white; border-color:var(--blue); }
    .qty-big-num { font-size:40px; font-weight:700; min-width:56px; text-align:center; }
    .qty-unit { font-size:13px; color:var(--text2); }

    /* detail fields */
    .dc-fields { padding:1rem 1.25rem; display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .df-l { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
    .df-v { font-size:14px; font-weight:500; }

    /* actions */
    .dc-acts { padding:1rem 1.25rem; display:flex; gap:8px; border-top:0.5px solid var(--border); }
    .btn-edit { flex:1; padding:8px; border:0.5px solid var(--border2); border-radius:var(--radius);
                background:none; color:var(--text); font-size:13px; cursor:pointer; font-weight:500; }
    .btn-edit:hover { background:var(--bg2); }
    .btn-lnk { flex:1; padding:8px; border:0.5px solid var(--blue); border-radius:var(--radius);
               background:none; color:var(--blue); font-size:13px; cursor:pointer; font-weight:500; }
    .btn-lnk:hover { background:var(--blue-lt); }
    .btn-del { padding:8px 14px; border:0.5px solid var(--red); border-radius:var(--radius);
               background:none; color:var(--red); font-size:13px; cursor:pointer; }
    .btn-del:hover { background:var(--red-lt); }

    /* ── MODALS ── */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100;
                align-items:center; justify-content:center; padding:1rem; }
    .modal-bg.open { display:flex; }
    .modal { background:var(--bg); border-radius:var(--radius-lg); border:0.5px solid var(--border);
             padding:1.5rem; width:100%; max-width:420px; max-height:90vh; overflow-y:auto; }
    .modal h3 { font-size:17px; font-weight:700; margin-bottom:1.25rem; }
    .field { margin-bottom:12px; }
    .field label { font-size:12px; color:var(--text2); display:block; margin-bottom:4px; }
    .field input,.field select { width:100%; padding:8px 10px; border:0.5px solid var(--border2);
                                  border-radius:var(--radius); background:var(--bg); color:var(--text);
                                  font-size:14px; outline:none; }
    .field input:focus,.field select:focus { border-color:var(--blue); }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .field-hint { font-size:11px; color:var(--text2); margin-top:3px; }
    .modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:1.25rem; }
    .btn-cancel { padding:8px 18px; border:0.5px solid var(--border2); border-radius:var(--radius);
                  background:none; color:var(--text2); font-size:14px; cursor:pointer; }
    .btn-save { padding:8px 18px; background:var(--blue); color:white; border:none;
                border-radius:var(--radius); font-size:14px; cursor:pointer; font-weight:600; }
    .btn-save:disabled { opacity:.6; cursor:not-allowed; }

    /* Reg grid */
    .reg-grid { display:grid; grid-template-columns:repeat(9,1fr); gap:4px; margin-top:4px; }
    .reg-cell { padding:5px 2px; border:0.5px solid var(--border2); border-radius:5px;
                background:var(--bg2); color:var(--text2); font-size:12px; font-weight:600;
                text-align:center; cursor:pointer; transition:all .12s; }
    .reg-cell:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-lt); }
    .reg-cell.on { background:var(--blue); color:white; border-color:var(--blue); }

    /* Autocomplete */
    .ac-wrap { position:relative; }
    .ac-list { position:absolute; top:calc(100% + 3px); left:0; right:0; background:var(--bg);
               border:0.5px solid var(--border2); border-radius:var(--radius); z-index:400;
               max-height:200px; overflow-y:auto; box-shadow:0 6px 20px rgba(0,0,0,.13); display:none; }
    .ac-list.show { display:block; }
    .ac-item { padding:8px 12px; font-size:13px; cursor:pointer; border-bottom:0.5px solid var(--border); }
    .ac-item:last-child { border-bottom:none; }
    .ac-item:hover,.ac-item.hi { background:var(--blue-lt); color:var(--blue); }

    /* ── IMAGE PICKER MODAL ── */
    .img-modal { max-width:560px; }
    .img-search-row { display:flex; gap:8px; margin-bottom:1rem; }
    .img-search-row input { flex:1; padding:8px 12px; border:0.5px solid var(--border2);
                             border-radius:var(--radius); background:var(--bg); color:var(--text);
                             font-size:14px; outline:none; }
    .img-search-row input:focus { border-color:var(--blue); }
    .btn-search { padding:8px 16px; background:var(--blue); color:white; border:none;
                  border-radius:var(--radius); font-size:13px; cursor:pointer; font-weight:600; white-space:nowrap; }
    .btn-search:disabled { opacity:.6; cursor:not-allowed; }
    .img-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:10px;
                max-height:340px; overflow-y:auto; }
    .img-cell { border-radius:8px; overflow:hidden; border:2px solid transparent; cursor:pointer;
                transition:all .15s; position:relative; }
    .img-cell:hover { border-color:var(--blue); transform:scale(1.03); }
    .img-cell.picked { border-color:var(--blue); }
    .img-cell.picked::after { content:'✓'; position:absolute; top:4px; right:4px; width:20px; height:20px;
                               border-radius:50%; background:var(--blue); color:white; font-size:12px;
                               display:flex; align-items:center; justify-content:center; font-weight:700; }
    .img-cell img { width:100%; display:block; border-radius:6px; }
    .img-cell-name { font-size:10px; color:var(--text2); padding:2px 4px 4px; text-align:center; }
    .img-empty { padding:2rem; text-align:center; color:var(--text2); font-size:13px; }
    .img-loading { padding:2rem; text-align:center; color:var(--text2); font-size:13px; }
    .img-modal-btns { display:flex; gap:8px; justify-content:space-between; margin-top:1rem; }
    .btn-no-img { padding:8px 14px; border:0.5px solid var(--border2); border-radius:var(--radius);
                  background:none; color:var(--text2); font-size:13px; cursor:pointer; }

    /* Lightbox */
    .lbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:600;
            align-items:center; justify-content:center; cursor:pointer; }
    .lbox.open { display:flex; }
    .lbox img { max-width:min(380px,90vw); max-height:88vh; border-radius:14px; cursor:default;
                box-shadow:0 24px 64px rgba(0,0,0,.6); }
    .lbox-close { position:absolute; top:1rem; right:1.25rem; color:white; font-size:28px; cursor:pointer; }

    /* Toast / Loading */
    .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px);
             background:#1a1a1a; color:white; padding:10px 20px; border-radius:20px;
             font-size:13px; opacity:0; transition:all .3s; z-index:700; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .loading-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3);
                  z-index:800; align-items:center; justify-content:center; }
    .loading-ov.show { display:flex; }
    .loading-box { background:var(--bg); padding:1.25rem 2rem; border-radius:var(--radius-lg); font-size:14px; color:var(--text2); }

    /* Mobile */
    @media(max-width:700px){
      body { overflow:auto; }
      .app { height:auto; overflow:auto; }
      .main { flex-direction:column; }
      .lp { width:100%; border-right:none; border-bottom:0.5px solid var(--border); max-height:50vh; }
      .rp { min-height:50vh; }
      .rp-detail { padding:1rem; }
      .dc-header { flex-direction:column; align-items:center; text-align:center; }
      .dc-pills { justify-content:center; }
      .dc-fields { grid-template-columns:1fr 1fr; }
      .uname { display:none; }
      .stats-bar { display:none; }
      .field-row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">🃏</div>
    <div class="auth-title">PTCG 卡牌管理系統</div>
    <div class="auth-sub">登入以管理你的個人卡牌收藏</div>
    <button class="btn-google" id="btnGoogle" onclick="loginGoogle()">
      <svg class="gico" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      使用 Google 帳號登入
    </button>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-note">每位玩家的資料獨立保存於雲端<br>任何裝置皆可存取</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <span class="tb-title">🃏 PTCG 卡牌管理</span>
    <div class="uinfo">
      <div class="uav-fb" id="uavFb"></div>
      <img class="uav" id="uav" style="display:none" alt="">
      <span class="uname" id="uname"></span>
    </div>
    <button class="btn-sm" onclick="logout()">登出</button>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="main">

    <!-- LEFT -->
    <div class="lp">
      <div class="lp-head">
        <h2>搜尋卡牌</h2>
        <div class="sb">
          <span class="sb-ico">🔍</span>
          <input id="searchQ" type="text" placeholder="輸入名稱搜尋..." autocomplete="off"
            oninput="onSearch()" onkeydown="onSearchKd(event)">
          <div class="ac-list" id="searchAc"></div>
        </div>
        <div class="f-sec">
          <div class="f-sec-lbl">卡牌種類</div>
          <div class="chips" id="chipCat"></div>
        </div>
        <div class="f-sec" id="fTypeSec">
          <div class="f-sec-lbl">屬性</div>
          <div class="chips" id="chipType"></div>
        </div>
        <div class="f-sec">
          <div class="f-sec-lbl">稀有度</div>
          <div class="chips" id="chipRar"></div>
        </div>
      </div>
      <div class="cl" id="cardList"></div>
      <div class="lp-foot">
        <button class="btn-add" onclick="openAddModal()">＋ 新增卡牌到收藏</button>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="rp">
      <div class="rp-empty" id="rpEmpty">
        <div class="rp-empty-ico">👈</div>
        <div class="rp-empty-txt">從左側選擇一張卡牌</div>
        <div class="rp-empty-sub">可依名稱、種類、屬性、稀有度篩選</div>
      </div>
      <div class="rp-detail" id="rpDetail">
        <div class="dc">
          <div class="dc-header">
            <div class="dc-img-wrap" id="dcImgWrap"></div>

const ref = () => collection(db,'users',user.uid,'cards');
async function loadCards() {

// ══ Filters ══
function buildChips() {
  mk('chipCat', CATS, fCat, v=>{ fCat=fCat===v?'':v; if(fCat!=='寶可夢') fType=''; buildChips(); renderList(); });
  document.getElementById('fTypeSec').style.display = (!fCat||fCat==='寶可夢')?'':'none';
  mk('chipType', TYPES, fType, v=>{ fType=fType===v?'':v; buildChips(); renderList(); });
  mk('chipRar', RARS, fRar, v=>{ fRar=fRar===v?'':v; buildChips(); renderList(); });
}
function mk(id, items, cur, fn) {
  const el=document.getElementById(id); el.innerHTML='';
  items.forEach(i=>{ const c=document.createElement('div'); c.className='chip'+(cur===i?' on':''); c.textContent=i; c.onclick=()=>fn(i); el.appendChild(c); });
}

// ══ List ══
function getFiltered() {
  const q=searchQ.toLowerCase();
  return cards.filter(c=>{
    if(fCat&&c.cat!==fCat) return false;
    if(fType&&c.type!==fType) return false;
    if(fRar&&c.rarity!==fRar) return false;
    if(q&&!c.name.toLowerCase().includes(q)&&!c.reg.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderList() {
  const cl=document.getElementById('cardList');
  const list=getFiltered();
  if(!list.length){ cl.innerHTML=`<div class="cl-empty">${cards.length?'沒有符合條件的卡牌':'尚無卡牌，點下方新增'}</div>`; return; }
  cl.innerHTML='';
  list.forEach(c=>{
    const row=document.createElement('div');
    row.className='cr'+(c.id===selId?' sel':'');
    row.onclick=()=>selCard(c.id);
    const imgHtml = c.imageUrl
      ? `<img class="cr-img" src="${c.imageUrl}" alt="" loading="lazy">`
      : `<div class="cr-img-ph">🃏</div>`;
    const meta=[c.cat,c.type,c.rarity].filter(Boolean).join(' · ');
    row.innerHTML=`${imgHtml}<div class="cr-reg">${c.reg}</div>
      <div class="cr-info"><div class="cr-name">${c.name}</div><div class="cr-meta">${meta}</div></div>
      <div class="cr-qb${c.qty>0?'':' z'}">${c.qty}</div>`;
    cl.appendChild(row);
  });
}

function renderStats() {
  const tot=cards.reduce((s,c)=>s+c.qty,0);
  const rare=cards.filter(c=>['★ AR (Art Rare)','★★ SAR (Special Art Rare)','★★★ UR (Ultra Rare)','★★★★ SR (Super Rare)'].includes(c.rarity)).length;
  document.getElementById('statsBar').innerHTML=[
    ['種類',cards.length],['總張數',tot],
    ['寶可夢',cards.filter(c=>c.cat==='寶可夢').length],
    ['訓練家',cards.filter(c=>['支援者','物品','道具'].includes(c.cat)).length],
    ['高稀有',rare],['已有卡面',cards.filter(c=>c.imageUrl).length],
  ].map(([l,v])=>`<div class="si"><div class="si-l">${l}</div><div class="si-v">${v}</div></div>`).join('');
}

function renderAll() { buildChips(); renderList(); renderStats(); }

// ══ Detail ══
function selCard(id) { selId=id; renderList(); renderDetail(); }

function renderDetail() {
  const c=cards.find(x=>x.id===selId);
  document.getElementById('rpEmpty').style.display=c?'none':'flex';
  document.getElementById('rpDetail').classList.toggle('on',!!c);
  if(!c) return;
  document.getElementById('dReg').textContent=c.reg;
  document.getElementById('dName').textContent=c.name;
  document.getElementById('dQty').textContent=c.qty;
  // image
  const iw=document.getElementById('dcImgWrap');
  if(c.imageUrl) {
    iw.innerHTML=`<img class="dc-img" src="${c.imageUrl}" alt="${c.name}" onclick="openLbox('${c.imageUrl}')">`;
  } else {
    iw.innerHTML=`<div class="dc-img-ph">🃏</div>`;
  }
  // pills
  const pills=document.getElementById('dPills');
  const cc2=CC[c.cat]||{bg:'#eee',c:'#333'};
  let ph=`<span class="pill" style="background:${cc2.bg};color:${cc2.c}">${c.cat}</span>`;
  if(c.type){const t=TC[c.type]||TC['一般'];ph+=`<span class="pill" style="background:${t.bg};color:${t.c}"><span class="dot" style="background:${t.dot}"></span>${c.type}</span>`;}
  if(c.rarity){const r=RC[c.rarity]||{bg:'#eee',c:'#333'};ph+=`<span class="pill" style="background:${r.bg};color:${r.c}">${c.rarity}</span>`;}
  pills.innerHTML=ph;
  // fields
  document.getElementById('dFields').innerHTML=[['賽場標誌',c.reg],['類別',c.cat],['屬性',c.type||'—'],['稀有度',c.rarity||'—']]
    .map(([l,v])=>`<div><div class="df-l">${l}</div><div class="df-v">${v}</div></div>`).join('');
}

window.adjQty = async delta => {
  const c=cards.find(x=>x.id===selId); if(!c) return;
  const qty=Math.max(0,c.qty+delta);
  try { await updateDoc(doc(db,'users',user.uid,'cards',selId),{qty}); c.qty=qty; renderList(); renderDetail(); renderStats(); }
  catch(e){ toast('❌ 更新失敗'); }
};

  try {
    await deleteDoc(doc(db,'users',user.uid,'cards',selId));
    cards=cards.filter(x=>x.id!==selId); selId=null; renderAll(); renderDetail(); toast('已刪除');

window.saveCard = async () => {
  const btn=document.getElementById('btnSave');
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('請輸入卡牌名稱');return;}
  const cat=document.getElementById('fCat').value;
  const data={
    reg:selReg, name, cat,
    type: cat==='寶可夢'?document.getElementById('fType').value:'',
    rarity: document.getElementById('fRar').value,
    qty: editId?cards.find(x=>x.id===editId)?.qty||0:0,
    imageUrl: editId?cards.find(x=>x.id===editId)?.imageUrl||'':'',
  };
  btn.disabled=true; btn.textContent='儲存中...';
  try {
    if(editId){
      await updateDoc(doc(db,'users',user.uid,'cards',editId),data);
      Object.assign(cards.find(x=>x.id===editId),data);
      selId=editId; toast('✅ 已更新');
    } else {
      const r=await addDoc(ref(),{...data,createdAt:serverTimestamp()});
      const nc={id:r.id,...data}; cards.push(nc); selId=r.id; toast('✅ 已新增：'+name);
    }
    closeModal(); renderAll(); renderDetail();
    // auto open img picker for new cards
    if(!editId) setTimeout(()=>openImgPicker(false,name),300);
  } catch(e){ toast('❌ 儲存失敗'); }
  btn.disabled=false; btn.textContent='儲存';
};

// ══ IMAGE PICKER ══
window.openImgPicker = (forEdit=true, suggestName='') => {
  imgPickerForEdit=forEdit; pickedImgUrl=''; imgResults=[];
  const c=cards.find(x=>x.id===selId);
  const qVal = suggestName || (c?c.name:'');
  document.getElementById('imgQ').value=qVal;
  document.getElementById('imgGrid').innerHTML='';
  document.getElementById('btnImgApply').disabled=true;
  document.getElementById('imgModalBg').classList.add('open');
  if(qVal) searchImg();
};
window.closeImgModal = () => document.getElementById('imgModalBg').classList.remove('open');

window.searchImg = async () => {
  const q=document.getElementById('imgQ').value.trim();
  if(!q) return;
  const btn=document.getElementById('btnImgSearch');
  btn.disabled=true; btn.textContent='搜尋中...';
  document.getElementById('imgGrid').innerHTML=`<div class="img-loading" style="grid-column:1/-1">搜尋中...</div>`;
  pickedImgUrl=''; imgResults=[];
  document.getElementById('btnImgApply').disabled=true;
  try {
    const res=await fetch(`${TCGAPI}?q=name:"${encodeURIComponent(q)}"&pageSize=20&orderBy=-set.releaseDate`);
    const data=await res.json();
    imgResults=data.data||[];
    renderImgGrid();
  } catch(e){
    document.getElementById('imgGrid').innerHTML=`<div class="img-empty" style="grid-column:1/-1">搜尋失敗，請確認網路連線</div>`;
  }
  btn.disabled=false; btn.textContent='搜尋';
};

function renderImgGrid() {
  const grid=document.getElementById('imgGrid');
  if(!imgResults.length){
    grid.innerHTML=`<div class="img-empty" style="grid-column:1/-1">找不到符合的卡牌<br><small>請嘗試英文名稱（如 Pikachu、Charizard）</small></div>`;
    return;
  }
  grid.innerHTML='';
  imgResults.forEach(card=>{
    const url=card.images?.small||'';
    if(!url) return;
    const cell=document.createElement('div');
    cell.className='img-cell'+(pickedImgUrl===url?' picked':'');
    cell.innerHTML=`<img src="${url}" alt="${card.name}" loading="lazy">
      <div class="img-cell-name">${card.set?.name||''}</div>`;
    cell.onclick=()=>{ pickedImgUrl=url; renderImgGrid(); document.getElementById('btnImgApply').disabled=false; };
    grid.appendChild(cell);
  });
}

window.applyImg = async () => {
  if(!pickedImgUrl||!selId) return;
  try {
    await updateDoc(doc(db,'users',user.uid,'cards',selId),{imageUrl:pickedImgUrl});
    const c=cards.find(x=>x.id===selId); if(c) c.imageUrl=pickedImgUrl;
    closeImgModal(); renderList(); renderDetail(); renderStats(); toast('✅ 卡面已更新');
  } catch(e){ toast('❌ 更新失敗'); }
};
window.applyNoImg = async () => {
  if(!selId) return;
  try {
    await updateDoc(doc(db,'users',user.uid,'cards',selId),{imageUrl:''});
    const c=cards.find(x=>x.id===selId); if(c) c.imageUrl='';
    closeImgModal(); renderList(); renderDetail(); renderStats(); toast('已移除卡面');
  } catch(e){ toast('❌ 更新失敗'); }
};

// ══ LIGHTBOX ══
window.openLbox = url => { document.getElementById('lboxImg').src=url; document.getElementById('lbox').classList.add('open'); };
window.closeLbox = () => document.getElementById('lbox').classList.remove('open');

// ══ REG GRID ══
function initRegGrid() {
  const g=document.getElementById('regGrid'); g.innerHTML='';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l=>{
    const c=document.createElement('div');
    c.className='reg-cell'+(l===selReg?' on':'');
    c.textContent=l;
    c.onclick=()=>{ selReg=l; initRegGrid(); updRegLbl(); };
    g.appendChild(c);
  });
}
function updRegLbl() { document.getElementById('regLbl').textContent=selReg; }

// ══ AUTOCOMPLETE: Search ══
let srchIdx=-1;
window.onSearch = () => {
  searchQ=document.getElementById('searchQ').value.trim();
  const q=searchQ.toLowerCase(), ac=document.getElementById('searchAc');
  srchIdx=-1;
  if(!q){ ac.classList.remove('show'); renderList(); return; }
  const fm=[...new Set(cards.map(c=>c.name))].filter(n=>n.toLowerCase().includes(q));
  const fd=POKEMON_ZH.filter(n=>n.includes(searchQ)&&!fm.includes(n));
  const m=[...fm,...fd].slice(0,10);
  ac.innerHTML=''; if(!m.length){ac.classList.remove('show');renderList();return;}
  m.forEach(n=>{const i=document.createElement('div');i.className='ac-item';i.textContent=n;
    i.onmousedown=e=>{e.preventDefault();document.getElementById('searchQ').value=n;searchQ=n;ac.classList.remove('show');renderList();};
    ac.appendChild(i);});
  ac.classList.add('show'); renderList();
};
window.onSearchKd = e => {
  const ac=document.getElementById('searchAc'),items=ac.querySelectorAll('.ac-item');
  if(!ac.classList.contains('show')) return;
  if(e.key==='ArrowDown'){e.preventDefault();srchIdx=Math.min(srchIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hi',i===srchIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();srchIdx=Math.max(srchIdx-1,-1);items.forEach((el,i)=>el.classList.toggle('hi',i===srchIdx));}
  else if(e.key==='Enter'&&srchIdx>=0){e.preventDefault();const n=items[srchIdx].textContent;document.getElementById('searchQ').value=n;searchQ=n;ac.classList.remove('show');renderList();}
  else if(e.key==='Escape') ac.classList.remove('show');
};

// ══ AUTOCOMPLETE: Name ══
let nameIdx=-1;
window.onNameAc = () => {
  const v=document.getElementById('fName').value.trim(), ac=document.getElementById('nameAc');
  nameIdx=-1; if(!v){ac.classList.remove('show');return;}
  const q=v.toLowerCase();
  const fm=[...new Set(cards.map(c=>c.name))].filter(n=>n.toLowerCase().includes(q));
  const fd=POKEMON_ZH.filter(n=>n.includes(v)&&!fm.includes(n));
  const m=[...fm,...fd].slice(0,10);
  ac.innerHTML=''; if(!m.length){ac.classList.remove('show');return;}
  m.forEach(n=>{const i=document.createElement('div');i.className='ac-item';i.textContent=n;
    i.onmousedown=e=>{e.preventDefault();document.getElementById('fName').value=n;ac.classList.remove('show');};
    ac.appendChild(i);});
  ac.classList.add('show');
};
window.onNameKd = e => {
  const ac=document.getElementById('nameAc'),items=ac.querySelectorAll('.ac-item');
  if(!ac.classList.contains('show')) return;
  if(e.key==='ArrowDown'){e.preventDefault();nameIdx=Math.min(nameIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hi',i===nameIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();nameIdx=Math.max(nameIdx-1,-1);items.forEach((el,i)=>el.classList.toggle('hi',i===nameIdx));}
  else if(e.key==='Enter'&&nameIdx>=0){e.preventDefault();document.getElementById('fName').value=items[nameIdx].textContent;ac.classList.remove('show');}
  else if(e.key==='Escape') ac.classList.remove('show');
};

// ══ AUTOCOMPLETE: Type ══
let typeIdx=-1;
window.showTypeAc = () => {
  const ac=document.getElementById('typeAc'); typeIdx=-1; ac.innerHTML='';
  TYPES.forEach(t=>{const i=document.createElement('div');i.className='ac-item';i.textContent=t;
    i.onmousedown=e=>{e.preventDefault();document.getElementById('fType').value=t;ac.classList.remove('show');};
    ac.appendChild(i);});
  ac.classList.add('show');
};
window.onTypeKd = e => {
  const ac=document.getElementById('typeAc'),items=ac.querySelectorAll('.ac-item');
  if(!ac.classList.contains('show')&&e.key==='ArrowDown'){showTypeAc();return;}
  if(e.key==='ArrowDown'){e.preventDefault();typeIdx=Math.min(typeIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hi',i===typeIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();typeIdx=Math.max(typeIdx-1,-1);items.forEach((el,i)=>el.classList.toggle('hi',i===typeIdx));}
  else if(e.key==='Enter'&&typeIdx>=0){e.preventDefault();document.getElementById('fType').value=items[typeIdx].textContent;ac.classList.remove('show');}
  else if(e.key==='Escape') ac.classList.remove('show');
};

// ══ CLOSE DROPDOWNS ON OUTSIDE CLICK ══
document.addEventListener('click', e=>{
  if(!e.target.closest('.sb'))       document.getElementById('searchAc').classList.remove('show');
  if(!e.target.closest('#fName')&&!e.target.closest('#nameAc')) document.getElementById('nameAc').classList.remove('show');
  if(!e.target.closest('#fTypeWrap')) document.getElementById('typeAc').classList.remove('show');
});
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ closeModal(); closeImgModal(); closeLbox(); }
});
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById('imgModalBg').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeImgModal(); });

// ══ UTILS ══
function showLoad(v){ document.getElementById('loadOv').classList.toggle('show',v); }
let toastT;
window.toast = msg=>{ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2500); };

renderDetail();
</script>
</body>
