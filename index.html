<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTCG 卡牌管理系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f5;
      --bg3: #eeeeee;
      --text: #1a1a1a;
      --text2: #555555;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --blue: #378ADD;
      --blue-dark: #185FA5;
      --blue-light: #E6F1FB;
      --radius: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg2: #2c2c2e;
        --bg3: #3a3a3c;
        --text: #f2f2f7;
        --text2: #aeaeb2;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
        --blue-light: #1a3352;
      }
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

    .topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 17px; font-weight: 600; flex: 1; }
    .topbar-sub { font-size: 12px; color: var(--text2); }

    .container { max-width: 960px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px,1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--bg); border-radius: var(--radius); padding: 0.75rem 1rem; border: 0.5px solid var(--border); }
    .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .stat-val { font-size: 24px; font-weight: 600; }

    .toolbar { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1rem; margin-bottom: 1rem; }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
    .filters:last-child { margin-bottom: 0; }
    .filter-label { font-size: 12px; color: var(--text2); white-space: nowrap; min-width: 48px; }
    .filter-btn { font-size: 12px; padding: 3px 10px; border: 0.5px solid var(--border2); border-radius: 20px; background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; }
    .filter-btn.active, .filter-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .search-row input, .search-row select { padding: 8px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
    .search-row input { flex: 1; min-width: 140px; }
    .search-row input:focus, .search-row select:focus { border-color: var(--blue); }

    .btn-add { background: var(--blue); color: white; border: none; padding: 8px 18px; border-radius: var(--radius); font-size: 14px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    .btn-add:hover { background: var(--blue-dark); }

    .card-table { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }
    th { font-size: 11px; color: var(--text2); font-weight: 500; padding: 10px 12px; text-align: left; border-bottom: 0.5px solid var(--border); white-space: nowrap; background: var(--bg2); }
    td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg2); }

    .reg-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; background: var(--blue); color: white; font-size: 11px; font-weight: 600; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .series-text { font-size: 12px; color: var(--text2); white-space: nowrap; }

    .qty-wrap { display: flex; align-items: center; gap: 6px; }
    .qty-btn { width: 22px; height: 22px; border: 0.5px solid var(--border2); border-radius: 5px; background: var(--bg); color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
    .qty-btn:hover { background: var(--bg3); }
    .qty-num { min-width: 22px; text-align: center; font-size: 13px; font-weight: 600; }

    .action-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 3px 7px; border-radius: 5px; color: var(--text2); }
    .action-btn.edit:hover { color: var(--blue); background: var(--blue-light); }
    .action-btn.del:hover { color: #E24B4A; background: #FCEBEB; }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }

    /* Modal */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.5rem; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 1.25rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
    .field input, .field select { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
    .field input:focus, .field select:focus { border-color: var(--blue); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel { padding: 8px 18px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: none; color: var(--text2); font-size: 14px; cursor: pointer; }
    .btn-cancel:hover { background: var(--bg2); }
    .btn-save { padding: 8px 18px; background: var(--blue); color: white; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer; font-weight: 600; }
    .btn-save:hover { background: var(--blue-dark); }

    /* Toast */
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .topbar { padding: 0 1rem; }
      .container { padding: 1rem 0.75rem 3rem; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">🃏 PTCG 卡牌管理系統</span>
  <span class="topbar-sub" id="saveStatus">資料儲存於此裝置</span>
  <button class="btn-add" onclick="openModal()">+ 新增卡牌</button>
</div>

<div class="container">
  <div class="stats-row" id="statsRow"></div>

  <div class="toolbar">
    <div class="filters" id="catFilter"></div>
    <div class="filters" id="typeFilter"></div>
    <div class="filters" id="rarityFilter"></div>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="🔍 搜尋名稱、賽場標誌或系列..." oninput="render()">
    <select id="sortSelect" onchange="render()">
      <option value="reg">排序：賽場標誌</option>
      <option value="name">排序：名稱</option>
      <option value="qty">排序：張數</option>
      <option value="series">排序：系列別</option>
      <option value="rarity">排序：稀有度</option>
    </select>
  </div>

  <div class="card-table">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>賽場標誌</th><th>名稱</th><th>類別</th><th>屬性</th>
            <th>系列別</th><th>稀有度</th><th>擁有張數</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="empty" id="emptyMsg" style="display:none">尚無符合條件的卡牌<br><small style="margin-top:6px;display:block">點選右上角「新增卡牌」開始管理你的收藏</small></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">新增卡牌</h3>
    <div class="field-row">
      <div class="field"><label>賽場標誌 (A–Z)</label><select id="fReg"></select></div>
      <div class="field"><label>擁有張數</label><input type="number" id="fQty" min="1" max="99" value="1"></div>
    </div>
    <div class="field"><label>名稱</label><input type="text" id="fName" placeholder="例：皮卡丘 ex"></div>
    <div class="field-row">
      <div class="field"><label>類別</label>
        <select id="fCat"><option>寶可夢</option><option>支援者</option><option>物品</option><option>道具</option><option>能量</option></select>
      </div>
      <div class="field"><label>屬性</label>
        <select id="fType"><option>一般</option><option>火</option><option>水</option><option>草</option><option>電</option><option>惡</option><option>超</option><option>鬥</option><option>鋼</option><option>龍</option></select>
      </div>
    </div>
    <div class="field"><label>系列別</label>
      <select id="fSeries">
        <option>SV1 朱與紫</option><option>SV2 拱廊之星</option><option>SV3 黑焰支配者</option>
        <option>SV3a 幻之面具</option><option>SV4 古代咆哮</option><option>SV4a 未來閃光</option>
        <option>SV5 時空奇異點</option><option>SV6 塵霧之面紗</option><option>SV6a 天蜂之假面</option>
        <option>SV7 超電磁波的暴走</option><option>SV7a 翻滾狂歡</option><option>SV8 超越天空</option>
        <option>SV8a 幻彩傳說</option><option>其他/促銷</option>
      </select>
    </div>
    <div class="field"><label>稀有度</label>
      <select id="fRarity">
        <option>◆ C (Common)</option><option>◆◆ U (Uncommon)</option><option>◆◆◆ R (Rare)</option>
        <option>◆◆◆◆ RR (Double Rare)</option><option>★ AR (Art Rare)</option>
        <option>★★ SAR (Special Art Rare)</option><option>★★★ UR (Ultra Rare)</option>
        <option>★★★★ SR (Super Rare)</option><option>◇ ACE SPEC</option><option>♦ PR (Promo)</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveCard()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TYPE_CONFIG = {
  '一般':{bg:'#F1EFE8',color:'#444441',dot:'#888780'},
  '火':{bg:'#FAECE7',color:'#993C1D',dot:'#EF5350'},
  '水':{bg:'#E6F1FB',color:'#185FA5',dot:'#42A5F5'},
  '草':{bg:'#EAF3DE',color:'#3B6D11',dot:'#66BB6A'},
  '電':{bg:'#FAEEDA',color:'#854F0B',dot:'#FDD835'},
  '惡':{bg:'#2C2C2A',color:'#D3D1C7',dot:'#888780'},
  '超':{bg:'#EEEDFE',color:'#3C3489',dot:'#AB47BC'},
  '鬥':{bg:'#FAECE7',color:'#712B13',dot:'#FF7043'},
  '鋼':{bg:'#F1EFE8',color:'#3C3489',dot:'#78909C'},
  '龍':{bg:'#EEEDFE',color:'#26215C',dot:'#5C6BC0'},
};
const CAT_CONFIG = {
  '寶可夢':{bg:'#E6F1FB',color:'#0C447C'},
  '支援者':{bg:'#EEEDFE',color:'#3C3489'},
  '物品':{bg:'#EAF3DE',color:'#27500A'},
  '道具':{bg:'#FAEEDA',color:'#633806'},
  '能量':{bg:'#FAECE7',color:'#993C1D'},
};
const RARITY_CONFIG = {
  '◆ C (Common)':{bg:'#F1EFE8',color:'#444441'},
  '◆◆ U (Uncommon)':{bg:'#EAF3DE',color:'#3B6D11'},
  '◆◆◆ R (Rare)':{bg:'#E6F1FB',color:'#0C447C'},
  '◆◆◆◆ RR (Double Rare)':{bg:'#EEEDFE',color:'#3C3489'},
  '★ AR (Art Rare)':{bg:'#FAEEDA',color:'#633806'},
  '★★ SAR (Special Art Rare)':{bg:'#FAECE7',color:'#993C1D'},
  '★★★ UR (Ultra Rare)':{bg:'#FAEEDA',color:'#854F0B'},
  '★★★★ SR (Super Rare)':{bg:'#FAECE7',color:'#712B13'},
  '◇ ACE SPEC':{bg:'#E6F1FB',color:'#185FA5'},
  '♦ PR (Promo)':{bg:'#EEEDFE',color:'#26215C'},
};
const RARITIES = ['全部','◆ C (Common)','◆◆ U (Uncommon)','◆◆◆ R (Rare)','◆◆◆◆ RR (Double Rare)','★ AR (Art Rare)','★★ SAR (Special Art Rare)','★★★ UR (Ultra Rare)','★★★★ SR (Super Rare)','◇ ACE SPEC','♦ PR (Promo)'];
const STORAGE_KEY = 'ptcg_cards_v1';

let cards = [], nextId = 1, editId = null;
let filterCat = '全部', filterType = '全部', filterRarity = '全部';

// --- Storage ---
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const d = JSON.parse(raw); cards = d.cards||[]; nextId = d.nextId||(cards.length?Math.max(...cards.map(c=>c.id))+1:1); }
  } catch(e) {}
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({cards, nextId})); } catch(e) {}
}

// --- Toast ---
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2000);
}

// --- Init selects ---
function initSelects() {
  const sel = document.getElementById('fReg');
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;sel.appendChild(o);});
}

// --- Filters ---
function makeFilter(id, items, current, setter) {
  const el = document.getElementById(id);
  const labels = {catFilter:'類別',typeFilter:'屬性',rarityFilter:'稀有度'};
  el.innerHTML = `<span class="filter-label">${labels[id]}：</span>`;
  items.forEach(item => {
    const b = document.createElement('button');
    b.className = 'filter-btn'+(current===item?' active':'');
    b.textContent = item;
    b.onclick = ()=>{ setter(item); buildFilters(); render(); };
    el.appendChild(b);
  });
}
function buildFilters() {
  makeFilter('catFilter',['全部','寶可夢','支援者','物品','道具','能量'],filterCat,v=>filterCat=v);
  makeFilter('typeFilter',['全部','一般','火','水','草','電','惡','超','鬥','鋼','龍'],filterType,v=>filterType=v);
  makeFilter('rarityFilter',RARITIES,filterRarity,v=>filterRarity=v);
}

// --- Stats ---
function updateStats() {
  const total = cards.reduce((s,c)=>s+c.qty,0);
  const rare = cards.filter(c=>['★ AR (Art Rare)','★★ SAR (Special Art Rare)','★★★ UR (Ultra Rare)','★★★★ SR (Super Rare)'].includes(c.rarity)).length;
  const series = new Set(cards.map(c=>c.series)).size;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">卡牌種類</div><div class="stat-val">${cards.length}</div></div>
    <div class="stat-card"><div class="stat-label">總張數</div><div class="stat-val">${total}</div></div>
    <div class="stat-card"><div class="stat-label">寶可夢</div><div class="stat-val">${cards.filter(c=>c.cat==='寶可夢').length}</div></div>
    <div class="stat-card"><div class="stat-label">高稀有度</div><div class="stat-val">${rare}</div></div>
    <div class="stat-card"><div class="stat-label">系列數</div><div class="stat-val">${series}</div></div>
  `;
}

// --- Render table ---
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const ro = {}; RARITIES.slice(1).forEach((r,i)=>ro[r]=i);
  let list = cards.filter(c=>{
    if(filterCat!=='全部'&&c.cat!==filterCat) return false;
    if(filterType!=='全部'&&c.type!==filterType) return false;
    if(filterRarity!=='全部'&&c.rarity!==filterRarity) return false;
    if(q&&!c.name.toLowerCase().includes(q)&&!c.reg.toLowerCase().includes(q)&&!(c.series||'').toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b)=>{
    if(sort==='name') return a.name.localeCompare(b.name,'zh-Hant');
    if(sort==='qty') return b.qty-a.qty;
    if(sort==='series') return (a.series||'').localeCompare(b.series||'');
    if(sort==='rarity') return (ro[a.rarity]||0)-(ro[b.rarity]||0);
    return a.reg.localeCompare(b.reg);
  });
  const tbody = document.getElementById('tbody');
  document.getElementById('emptyMsg').style.display = list.length?'none':'block';
  tbody.innerHTML = '';
  list.forEach(c=>{
    const tc=TYPE_CONFIG[c.type]||TYPE_CONFIG['一般'];
    const cc=CAT_CONFIG[c.cat]||{bg:'#eee',color:'#333'};
    const rc=RARITY_CONFIG[c.rarity]||{bg:'#F1EFE8',color:'#444441'};
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><span class="reg-badge">${c.reg}</span></td>
      <td style="font-weight:600">${c.name}</td>
      <td><span class="pill" style="background:${cc.bg};color:${cc.color}">${c.cat}</span></td>
      <td><span class="pill" style="background:${tc.bg};color:${tc.color}"><span class="dot" style="background:${tc.dot}"></span>${c.type}</span></td>
      <td><span class="series-text">${c.series||''}</span></td>
      <td><span class="pill" style="background:${rc.bg};color:${rc.color}">${c.rarity||''}</span></td>
      <td><div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty(${c.id},-1)">−</button>
        <span class="qty-num">${c.qty}</span>
        <button class="qty-btn" onclick="changeQty(${c.id},1)">+</button>
      </div></td>
      <td style="white-space:nowrap">
        <button class="action-btn edit" onclick="editCard(${c.id})" title="編輯">✎</button>
        <button class="action-btn del" onclick="delCard(${c.id})" title="刪除">✕</button>
      </td>`;
    tbody.appendChild(tr);
  });
  updateStats();
}

// --- Actions ---
function changeQty(id,delta){const c=cards.find(x=>x.id===id);if(c){c.qty=Math.max(1,c.qty+delta);render();saveData();}}
function delCard(id){if(!confirm('確定要刪除這張卡牌嗎？'))return;cards=cards.filter(x=>x.id!==id);render();saveData();showToast('已刪除');}

function editCard(id){
  const c=cards.find(x=>x.id===id);if(!c)return;
  editId=id;
  document.getElementById('modalTitle').textContent='編輯卡牌';
  document.getElementById('fReg').value=c.reg;
  document.getElementById('fName').value=c.name;
  document.getElementById('fCat').value=c.cat;
  document.getElementById('fType').value=c.type;
  document.getElementById('fSeries').value=c.series||'SV1 朱與紫';
  document.getElementById('fRarity').value=c.rarity||'◆ C (Common)';
  document.getElementById('fQty').value=c.qty;
  document.getElementById('modalBg').classList.add('open');
}

function openModal(){
  editId=null;
  document.getElementById('modalTitle').textContent='新增卡牌';
  document.getElementById('fReg').value='A';
  document.getElementById('fName').value='';
  document.getElementById('fCat').value='寶可夢';
  document.getElementById('fType').value='一般';
  document.getElementById('fSeries').value='SV1 朱與紫';
  document.getElementById('fRarity').value='◆ C (Common)';
  document.getElementById('fQty').value='1';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),100);
}

function closeModal(){document.getElementById('modalBg').classList.remove('open');}

function saveCard(){
  const reg=document.getElementById('fReg').value;
  const name=document.getElementById('fName').value.trim();
  const cat=document.getElementById('fCat').value;
  const type=document.getElementById('fType').value;
  const series=document.getElementById('fSeries').value;
  const rarity=document.getElementById('fRarity').value;
  const qty=Math.max(1,parseInt(document.getElementById('fQty').value)||1);
  if(!name){alert('請輸入卡牌名稱');return;}
  if(editId){Object.assign(cards.find(x=>x.id===editId),{reg,name,cat,type,series,rarity,qty});showToast('已更新');}
  else{cards.push({id:nextId++,reg,name,cat,type,series,rarity,qty});showToast('已新增：'+name);}
  closeModal();render();saveData();
}

document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// --- Boot ---
loadData();
initSelects();
buildFilters();
render();
</script>
</body>
</html>
