<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTCG 卡牌管理系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --bg2:#f4f4f6; --bg3:#e8e8ec;
      --text:#1a1a1a; --text2:#666; --text3:#aaa;
      --border:rgba(0,0,0,0.10); --border2:rgba(0,0,0,0.20);
      --blue:#378ADD; --blue-dk:#185FA5; --blue-lt:#E6F1FB;
      --red:#E24B4A; --red-lt:#FCEBEB;
      --green:#3A9A4A; --green-lt:#EAF5EC;
      --orange:#E07A10; --orange-lt:#FEF3E2;
      --radius:8px; --radius-lg:14px;
      --sidebar:300px; --topbar:52px;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#1c1c1e; --bg2:#2c2c2e; --bg3:#3a3a3c;
        --text:#f2f2f7; --text2:#aeaeb2; --text3:#636366;
        --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.20);
        --blue-lt:#1a3352; --red-lt:#3a1515; --green-lt:#1a2e1f; --orange-lt:#2e1f08;
      }
    }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg2); color:var(--text); }

    /* ── AUTH ── */
    .auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .auth-card { background:var(--bg); border-radius:var(--radius-lg); border:0.5px solid var(--border); padding:2.5rem 2rem; width:100%; max-width:360px; text-align:center; }
    .auth-logo { font-size:52px; margin-bottom:.75rem; }
    .auth-title { font-size:22px; font-weight:700; margin-bottom:.25rem; }
    .auth-sub { font-size:13px; color:var(--text2); margin-bottom:2rem; }
    .btn-google { width:100%; padding:12px; background:var(--bg); color:var(--text); border:0.5px solid var(--border2); border-radius:var(--radius); font-size:15px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; }
    .btn-google:hover { background:var(--bg2); }
    .btn-google:disabled { opacity:.6; cursor:not-allowed; }
    .gico { width:20px; height:20px; flex-shrink:0; }
    .auth-err { background:var(--red-lt); color:var(--red); font-size:13px; padding:8px 12px; border-radius:var(--radius); margin-top:1rem; display:none; }
    .auth-err.show { display:block; }
    .auth-note { font-size:12px; color:var(--text2); margin-top:1.25rem; line-height:1.6; }

    /* ── APP SHELL ── */
    .app { display:none; flex-direction:column; height:100vh; overflow:hidden; }
    .app.on { display:flex; }

    /* Topbar */
    .topbar { height:var(--topbar); background:var(--bg); border-bottom:0.5px solid var(--border); display:flex; align-items:center; gap:10px; padding:0 1.25rem; flex-shrink:0; z-index:30; }
    .tb-title { font-size:16px; font-weight:700; flex:1; }
    .uinfo { display:flex; align-items:center; gap:8px; }
    .uav { width:28px; height:28px; border-radius:50%; object-fit:cover; }
    .uav-fb { width:28px; height:28px; border-radius:50%; background:var(--blue); color:white; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; }
    .uname { font-size:13px; color:var(--text2); max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .btn-sm { padding:5px 12px; border:0.5px solid var(--border2); border-radius:var(--radius); background:none; color:var(--text2); font-size:12px; cursor:pointer; }
    .btn-sm:hover { background:var(--bg2); }

    /* Stats */
    .stats-bar { display:flex; background:var(--bg); border-bottom:0.5px solid var(--border); flex-shrink:0; overflow-x:auto; }
    .si { padding:7px 18px; text-align:center; border-right:0.5px solid var(--border); white-space:nowrap; flex-shrink:0; }
    .si:last-child { border-right:none; }
    .si-l { font-size:10px; color:var(--text2); margin-bottom:1px; }
    .si-v { font-size:17px; font-weight:700; }

    /* ── MAIN ── */
    .main { display:flex; flex:1; overflow:hidden; }

    /* ── LEFT PANEL ── */
    .lp { width:var(--sidebar); flex-shrink:0; display:flex; flex-direction:column; border-right:0.5px solid var(--border); background:var(--bg); overflow:hidden; }

    /* Search + Sort row */
    .lp-search { padding:10px; border-bottom:0.5px solid var(--border); flex-shrink:0; display:flex; gap:6px; align-items:center; }
    .sb { position:relative; flex:1; }
    .sb input { width:100%; padding:8px 12px 8px 30px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--bg2); color:var(--text); font-size:13px; outline:none; }
    .sb input:focus { border-color:var(--blue); background:var(--bg); }
    .sb-ico { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:13px; color:var(--text3); pointer-events:none; }
    .sort-btn { flex-shrink:0; padding:7px 10px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--bg); color:var(--text2); font-size:11px; cursor:pointer; white-space:nowrap; }
    .sort-btn:hover { background:var(--bg2); border-color:var(--blue); color:var(--blue); }
    .sort-btn.on { background:var(--blue-lt); border-color:var(--blue); color:var(--blue); }

    /* Filter panel – collapsible */
    .lp-filter { border-bottom:0.5px solid var(--border); flex-shrink:0; overflow:hidden; transition:max-height .25s ease; }
    .lp-filter.collapsed { max-height:0; }
    .lp-filter.expanded { max-height:400px; }
    .lp-filter-inner { padding:8px 10px 10px; }
    .f-sec { margin-bottom:8px; }
    .f-sec:last-child { margin-bottom:0; }
    .f-sec-lbl { font-size:10px; color:var(--text3); margin-bottom:3px; text-transform:uppercase; letter-spacing:.5px; }

    /* CHIPS – shortened rarity labels */
    .chips { display:flex; gap:4px; flex-wrap:wrap; }
    .chip { font-size:11px; padding:3px 8px; border:0.5px solid var(--border2); border-radius:20px; background:var(--bg); color:var(--text2); cursor:pointer; transition:all .12s; white-space:nowrap; }
    .chip.on, .chip:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-lt); }
    .chip-clear { font-size:11px; padding:3px 8px; border:none; border-radius:20px; background:var(--red-lt); color:var(--red); cursor:pointer; white-space:nowrap; display:none; }
    .chip-clear.show { display:inline-block; }

    /* Filter toggle bar */
    .filter-toggle { display:flex; align-items:center; padding:6px 10px; cursor:pointer; border-bottom:0.5px solid var(--border); flex-shrink:0; user-select:none; }
    .filter-toggle-lbl { font-size:11px; color:var(--text2); flex:1; }
    .filter-active-count { font-size:10px; background:var(--blue); color:white; border-radius:10px; padding:1px 7px; margin-left:6px; display:none; }
    .filter-active-count.show { display:inline-block; }
    .filter-chevron { font-size:12px; color:var(--text3); transition:transform .2s; }
    .filter-chevron.up { transform:rotate(180deg); }

    /* Card list */
    .cl { flex:1; overflow-y:auto; }
    .cl-empty { padding:2rem 1rem; text-align:center; color:var(--text2); font-size:13px; line-height:1.7; }
    .cl-empty .cl-empty-icon { font-size:36px; margin-bottom:.5rem; }
    .cr { display:flex; align-items:center; gap:9px; padding:9px 10px; border-bottom:0.5px solid var(--border); cursor:pointer; transition:background .12s; }
    .cr:hover { background:var(--bg2); }
    .cr.sel { background:var(--blue-lt); border-left:3px solid var(--blue); }
    .cr.sel .cr-name { color:var(--blue); }
    .cr-img { width:32px; height:44px; border-radius:3px; object-fit:cover; flex-shrink:0; background:var(--bg3); }
    .cr-img-ph { width:32px; height:44px; border-radius:3px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .cr-reg { width:22px; height:22px; border-radius:50%; background:var(--blue); color:white; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .cr-info { flex:1; min-width:0; }
    .cr-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cr-meta { font-size:11px; color:var(--text2); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    /* qty badge */
    .cr-qb { min-width:22px; height:22px; border-radius:11px; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 5px; flex-shrink:0; }
    .cr-qb.has { background:var(--blue); color:white; }
    .cr-qb.zero { background:var(--orange-lt); color:var(--orange); border:0.5px solid var(--orange); }

    /* Add button */
    .lp-foot { padding:8px 10px; border-top:0.5px solid var(--border); flex-shrink:0; }
    .btn-add { width:100%; padding:9px; background:var(--blue); color:white; border:none; border-radius:var(--radius); font-size:13px; font-weight:600; cursor:pointer; }
    .btn-add:hover { background:var(--blue-dk); }

    /* ── RIGHT PANEL ── */
    .rp { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg2); }

    /* Empty state – improved guidance */
    .rp-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text2); gap:10px; padding:2rem; text-align:center; }
    .rp-empty-ico { font-size:56px; }
    .rp-empty-txt { font-size:16px; font-weight:600; color:var(--text); }
    .rp-empty-sub { font-size:13px; color:var(--text2); line-height:1.6; max-width:260px; }
    .rp-empty-hint { display:flex; flex-direction:column; gap:8px; margin-top:8px; width:100%; max-width:260px; }
    .rp-hint-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text2); background:var(--bg); border-radius:var(--radius); padding:8px 12px; border:0.5px solid var(--border); }
    .rp-hint-ico { font-size:18px; flex-shrink:0; }

    /* Detail */
    .rp-detail { flex:1; overflow-y:auto; padding:1.5rem; display:none; }
    .rp-detail.on { display:block; }
    .dc { background:var(--bg); border-radius:var(--radius-lg); border:0.5px solid var(--border); overflow:hidden; max-width:520px; margin:0 auto; }
    .dc-header { display:flex; gap:1rem; padding:1.25rem; border-bottom:0.5px solid var(--border); }
    .dc-img-wrap { flex-shrink:0; }
    .dc-img { width:100px; border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.15); display:block; cursor:pointer; transition:transform .15s; }
    .dc-img:hover { transform:scale(1.04); }
    .dc-img-ph { width:100px; height:140px; border-radius:8px; background:var(--bg3); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; cursor:pointer; transition:background .15s; }
    .dc-img-ph:hover { background:var(--bg2); }
    .dc-img-ph-ico { font-size:32px; }
    .dc-img-ph-txt { font-size:10px; color:var(--text3); text-align:center; }
    .dc-header-info { flex:1; min-width:0; padding-top:4px; }
    .dc-reg { width:32px; height:32px; border-radius:50%; background:var(--blue); color:white; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
    .dc-name { font-size:20px; font-weight:700; margin-bottom:8px; }
    .dc-pills { display:flex; gap:5px; flex-wrap:wrap; }
    .pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:12px; font-size:11px; font-weight:500; }
    .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* Qty – with zero warning */
    .dc-qty { padding:1.25rem; border-bottom:0.5px solid var(--border); }
    .qty-lbl { font-size:11px; color:var(--text2); margin-bottom:10px; text-transform:uppercase; letter-spacing:.4px; display:flex; align-items:center; gap:8px; }
    .qty-warn { font-size:11px; background:var(--orange-lt); color:var(--orange); padding:2px 8px; border-radius:10px; display:none; }
    .qty-warn.show { display:inline-block; }
    .qty-ctrl { display:flex; align-items:center; gap:14px; }
    .qty-big-btn { width:46px; height:46px; border-radius:50%; border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s; }
    .qty-big-btn:hover { background:var(--bg3); }
    .qty-big-btn.add:hover { background:var(--blue); color:white; border-color:var(--blue); }
    .qty-big-btn:disabled { opacity:.3; cursor:not-allowed; }
    .qty-big-num { font-size:40px; font-weight:700; min-width:56px; text-align:center; transition:color .2s; }
    .qty-big-num.zero { color:var(--orange); }
    .qty-unit { font-size:13px; color:var(--text2); }

    /* Detail fields */
    .dc-fields { padding:1rem 1.25rem; display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .df-l { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px; }
    .df-v { font-size:14px; font-weight:500; }

    /* Actions */
    .dc-acts { padding:1rem 1.25rem; display:flex; gap:8px; border-top:0.5px solid var(--border); flex-wrap:wrap; }
    .btn-edit { flex:1; min-width:80px; padding:8px; border:0.5px solid var(--border2); border-radius:var(--radius); background:none; color:var(--text); font-size:13px; cursor:pointer; font-weight:500; }
    .btn-edit:hover { background:var(--bg2); }
    .btn-lnk { flex:1; min-width:80px; padding:8px; border:0.5px solid var(--blue); border-radius:var(--radius); background:none; color:var(--blue); font-size:13px; cursor:pointer; font-weight:500; }
    .btn-lnk:hover { background:var(--blue-lt); }
    .btn-del { padding:8px 14px; border:0.5px solid var(--red); border-radius:var(--radius); background:none; color:var(--red); font-size:13px; cursor:pointer; }
    .btn-del:hover { background:var(--red-lt); }

    /* ── MODALS ── */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; align-items:center; justify-content:center; padding:1rem; }
    .modal-bg.open { display:flex; }
    .modal { background:var(--bg); border-radius:var(--radius-lg); border:0.5px solid var(--border); padding:1.5rem; width:100%; max-width:820px; max-height:90vh; overflow-y:auto; }
    .modal h3 { font-size:17px; font-weight:700; margin-bottom:1.25rem; }
    .field { margin-bottom:12px; }
    .field label { font-size:12px; color:var(--text2); display:block; margin-bottom:4px; }
    .field input,.field select { width:100%; padding:8px 10px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--bg); color:var(--text); font-size:14px; outline:none; }
    .field input:focus,.field select:focus { border-color:var(--blue); }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:1.25rem; }
    .btn-cancel { padding:8px 18px; border:0.5px solid var(--border2); border-radius:var(--radius); background:none; color:var(--text2); font-size:14px; cursor:pointer; }
    .btn-save { padding:8px 18px; background:var(--blue); color:white; border:none; border-radius:var(--radius); font-size:14px; cursor:pointer; font-weight:600; }
    .btn-save:disabled { opacity:.6; cursor:not-allowed; }

    /* Modal two-col */
    .modal-inner { display:flex; gap:1.25rem; }
    .modal-form { flex:0 0 340px; min-width:0; }
    .modal-suggest { flex:1; min-width:0; display:flex; flex-direction:column; }
    .suggest-hd { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
    .suggest-status { font-size:12px; color:var(--text3); margin-bottom:8px; min-height:18px; }
    .suggest-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:8px; overflow-y:auto; flex:1; max-height:380px; }
    .sc { border-radius:8px; border:2px solid transparent; cursor:pointer; transition:all .15s; overflow:hidden; background:var(--bg2); }
    .sc:hover { border-color:var(--blue); transform:scale(1.03); }
    .sc.picked { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-lt); }
    .sc img { width:100%; display:block; border-radius:6px 6px 0 0; }
    .sc-ph { width:100%; height:112px; display:flex; align-items:center; justify-content:center; font-size:28px; background:var(--bg3); border-radius:6px 6px 0 0; }
    .sc-info { padding:3px 4px 5px; font-size:9px; color:var(--text2); line-height:1.3; }
    .sc-info strong { display:block; color:var(--text); font-size:10px; }

    /* Reg grid */
    .reg-grid { display:grid; grid-template-columns:repeat(9,1fr); gap:4px; margin-top:4px; }
    .reg-cell { padding:5px 2px; border:0.5px solid var(--border2); border-radius:5px; background:var(--bg2); color:var(--text2); font-size:12px; font-weight:600; text-align:center; cursor:pointer; transition:all .12s; }
    .reg-cell:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-lt); }
    .reg-cell.on { background:var(--blue); color:white; border-color:var(--blue); }

    /* Autocomplete */
    .ac-wrap { position:relative; }
    .ac-list { position:absolute; top:calc(100% + 3px); left:0; right:0; background:var(--bg); border:0.5px solid var(--border2); border-radius:var(--radius); z-index:400; max-height:200px; overflow-y:auto; box-shadow:0 6px 20px rgba(0,0,0,.13); display:none; }
    .ac-list.show { display:block; }
    .ac-item { padding:8px 12px; font-size:13px; cursor:pointer; border-bottom:0.5px solid var(--border); }
    .ac-item:last-child { border-bottom:none; }
    .ac-item:hover,.ac-item.hi { background:var(--blue-lt); color:var(--blue); }

    /* Image picker */
    .img-modal { max-width:560px; }
    .img-search-row { display:flex; gap:8px; margin-bottom:1rem; }
    .img-search-row input { flex:1; padding:8px 12px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--bg); color:var(--text); font-size:14px; outline:none; }
    .img-search-row input:focus { border-color:var(--blue); }
    .btn-search { padding:8px 16px; background:var(--blue); color:white; border:none; border-radius:var(--radius); font-size:13px; cursor:pointer; font-weight:600; white-space:nowrap; }
    .btn-search:disabled { opacity:.6; cursor:not-allowed; }
    .img-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:10px; max-height:340px; overflow-y:auto; }
    .img-cell { border-radius:8px; overflow:hidden; border:2px solid transparent; cursor:pointer; transition:all .15s; position:relative; }
    .img-cell:hover { border-color:var(--blue); transform:scale(1.03); }
    .img-cell.picked { border-color:var(--blue); }
    .img-cell.picked::after { content:'✓'; position:absolute; top:4px; right:4px; width:20px; height:20px; border-radius:50%; background:var(--blue); color:white; font-size:12px; display:flex; align-items:center; justify-content:center; font-weight:700; }
    .img-cell img { width:100%; display:block; border-radius:6px; }
    .img-cell-name { font-size:10px; color:var(--text2); padding:2px 4px 4px; text-align:center; }
    .img-empty { padding:2rem; text-align:center; color:var(--text2); font-size:13px; }
    .img-modal-btns { display:flex; gap:8px; justify-content:space-between; margin-top:1rem; }
    .btn-no-img { padding:8px 14px; border:0.5px solid var(--border2); border-radius:var(--radius); background:none; color:var(--text2); font-size:13px; cursor:pointer; }

    /* Lightbox */
    .lbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:600; align-items:center; justify-content:center; cursor:pointer; }
    .lbox.open { display:flex; }
    .lbox img { max-width:min(380px,90vw); max-height:88vh; border-radius:14px; cursor:default; box-shadow:0 24px 64px rgba(0,0,0,.6); }
    .lbox-close { position:absolute; top:1rem; right:1.25rem; color:white; font-size:28px; cursor:pointer; }

    /* Toast / Loading */
    .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px); background:#1a1a1a; color:white; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:all .3s; z-index:700; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .loading-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:800; align-items:center; justify-content:center; }
    .loading-ov.show { display:flex; }
    .loading-box { background:var(--bg); padding:1.25rem 2rem; border-radius:var(--radius-lg); font-size:14px; color:var(--text2); }

    /* Sort dropdown */
    .sort-dropdown { position:relative; }
    .sort-menu { display:none; position:absolute; top:calc(100% + 4px); right:0; background:var(--bg); border:0.5px solid var(--border2); border-radius:var(--radius); box-shadow:0 6px 20px rgba(0,0,0,.13); z-index:200; min-width:130px; }
    .sort-menu.open { display:block; }
    .sort-opt { padding:8px 14px; font-size:13px; cursor:pointer; border-bottom:0.5px solid var(--border); color:var(--text); }
    .sort-opt:last-child { border-bottom:none; }
    .sort-opt:hover { background:var(--blue-lt); color:var(--blue); }
    .sort-opt.active { color:var(--blue); font-weight:600; }

    /* Mobile */
    @media(max-width:700px){
      body { overflow:auto; }
      .app { height:auto; overflow:auto; }

  document.querySelectorAll('.sort-opt').forEach(o=>o.classList.toggle('active', o.dataset.sort===mode));
  document.getElementById('sortMenu').classList.remove('open');
  const labels={'reg':'賽場','name':'名稱','qty-desc':'張數↓','qty-asc':'張數↑','cat':'類別','rarity':'稀有'};
  document.getElementById('sortBtn').textContent=(labels[mode]||'排序')+' ▾';
  renderList();
};
function getSorted(list) {
  return [...list].sort((a,b)=>{
    if(sortMode==='name') return a.name.localeCompare(b.name,'zh-Hant');
    if(sortMode==='qty-desc') return b.qty-a.qty;
    if(sortMode==='qty-asc') return a.qty-b.qty;
    if(sortMode==='cat') return CAT_ORDER.indexOf(a.cat)-CAT_ORDER.indexOf(b.cat);
    if(sortMode==='rarity') return RAR_ORDER.indexOf(a.rarity)-RAR_ORDER.indexOf(b.rarity);
    return a.reg.localeCompare(b.reg);
  });
}

window.toggleFilter = () => {

window.clearFilters = () => { fCat=''; fType=''; fRar=''; buildChips(); renderList(); };

function countActiveFilters() { return [fCat,fType,fRar].filter(Boolean).length; }

function buildChips() {
  // Cat chips
  mk('chipCat', CATS, fCat, v=>{ fCat=fCat===v?'':v; if(fCat!=='寶可夢') fType=''; buildChips(); renderList(); });
  document.getElementById('fTypeSec').style.display=(!fCat||fCat==='寶可夢')?'':'none';
  mk('chipType', TYPES, fType, v=>{ fType=fType===v?'':v; buildChips(); renderList(); });
  // Short rarity chips mapped to full names
  const rc=document.getElementById('chipRar'); rc.innerHTML='';
  RARS.forEach((short,i)=>{
    const full=RARS_FULL[i];
    const c=document.createElement('div');
    c.className='chip'+(fRar===full?' on':'');
    c.textContent=short; c.title=full;
    c.onclick=()=>{ fRar=fRar===full?'':full; buildChips(); renderList(); };
    rc.appendChild(c);
  });
  // Active filter count badge
  const n=countActiveFilters();
  const badge=document.getElementById('filterCount');
  badge.textContent=n; badge.classList.toggle('show',n>0);
  document.getElementById('chipClearBtn').classList.toggle('show',n>0);
  // auto open filter panel if filters are set
  if(n>0 && !filterOpen) { filterOpen=true; document.getElementById('filterPanel').className='lp-filter expanded'; document.getElementById('filterChevron').className='filter-chevron up'; }
}
function mk(id,items,cur,fn){
  const el=document.getElementById(id); el.innerHTML='';
  items.forEach(i=>{ const c=document.createElement('div'); c.className='chip'+(cur===i?' on':''); c.textContent=i; c.onclick=()=>fn(i); el.appendChild(c); });
}

// ══ List ══
function getFiltered() {
  const q=searchQ.toLowerCase();
  return cards.filter(c=>{
    if(fCat&&c.cat!==fCat) return false;
    if(fType&&c.type!==fType) return false;
    if(fRar&&c.rarity!==fRar) return false;
    if(q&&!c.name.toLowerCase().includes(q)&&!c.reg.toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderList() {
  const cl=document.getElementById('cardList');
  const list=getSorted(getFiltered());
  if(!list.length){
    cl.innerHTML=`<div class="cl-empty"><div class="cl-empty-icon">${cards.length?'🔍':'📦'}</div>${cards.length?'沒有符合條件的卡牌<br><small>試著調整篩選條件或搜尋關鍵字</small>':'尚未新增任何卡牌<br><small>點下方「新增卡牌到收藏」開始管理</small>'}</div>`;
    return;
  }
  cl.innerHTML='';
  list.forEach(c=>{
    const row=document.createElement('div');
    row.className='cr'+(c.id===selId?' sel':'');
    row.onclick=()=>selCard(c.id);
    const imgHtml=c.imageUrl?`<img class="cr-img" src="${c.imageUrl}" alt="" loading="lazy">`:`<div class="cr-img-ph">🃏</div>`;
    const meta=[c.cat,c.type,c.rarity].filter(Boolean).join(' · ');
    const qbClass=c.qty>0?'has':'zero';
    row.innerHTML=`${imgHtml}<div class="cr-reg">${c.reg}</div>
      <div class="cr-info"><div class="cr-name">${c.name}</div><div class="cr-meta">${meta}</div></div>
      <div class="cr-qb ${qbClass}">${c.qty}</div>`;
    cl.appendChild(row);
  });
}

function renderStats() {
  const tot=cards.reduce((s,c)=>s+c.qty,0);
  const rare=cards.filter(c=>['★ AR (Art Rare)','★★ SAR (Special Art Rare)','★★★ UR (Ultra Rare)','★★★★ SR (Super Rare)'].includes(c.rarity)).length;
  document.getElementById('statsBar').innerHTML=[
    ['種類',cards.length],['總張數',tot],
    ['寶可夢',cards.filter(c=>c.cat==='寶可夢').length],
    ['訓練家',cards.filter(c=>['支援者','物品','道具'].includes(c.cat)).length],
    ['高稀有',rare],['有卡面',cards.filter(c=>c.imageUrl).length],
  ].map(([l,v])=>`<div class="si"><div class="si-l">${l}</div><div class="si-v">${v}</div></div>`).join('');
}

window.triggerSuggest = () => { clearTimeout(suggestTimer); suggestTimer=setTimeout(runSuggest,600); };
async function runSuggest() {
  const name=document.getElementById('fName').value.trim();
  const rarKey=document.getElementById('fRar').value;
  const status=document.getElementById('suggestStatus');
  const grid=document.getElementById('suggestGrid');
  if(!name){ status.textContent='填寫名稱後自動搜尋...'; grid.innerHTML=''; return; }
  status.textContent='搜尋中...'; grid.innerHTML=''; pickedSuggest=null;
  const apiRar=RAR_API_MAP[rarKey];
  let url=`${TCGAPI}?name=${encodeURIComponent(name)}&itemsPerPage=30`;
  if(apiRar) url+=`&rarity=${encodeURIComponent(apiRar)}`;
  try {
    const res=await fetch(url); const data=await res.json();
    let results=Array.isArray(data)?data:[];
    if(!results.length&&apiRar){ const r2=await fetch(`${TCGAPI}?name=${encodeURIComponent(name)}&itemsPerPage=30`); const d2=await r2.json(); results=Array.isArray(d2)?d2:[]; }
    renderSuggest(results,name);
  } catch(e){ status.textContent='搜尋失敗，請確認網路連線'; }
}
function renderSuggest(results,name) {
  const status=document.getElementById('suggestStatus');
  const grid=document.getElementById('suggestGrid');
  grid.innerHTML='';
  if(!results.length){ status.textContent=`找不到「${name}」，可直接手動填寫後儲存`; return; }
  status.textContent=`找到 ${results.length} 張符合的卡牌，點選套用`;
  results.forEach(card=>{
    const imgUrl=tcgImg(card,'low');
    const cell=document.createElement('div'); cell.className='sc';
    cell.innerHTML=(imgUrl?`<img src="${imgUrl}" alt="${card.name}" loading="lazy">`:`<div class="sc-ph">🃏</div>`)+
      `<div class="sc-info"><strong>${card.name}</strong>${card.set?.name||''}<br>${card.rarity||''}</div>`;
    cell.onclick=()=>applySuggest(card,cell);
    grid.appendChild(cell);
  });
}
function applySuggest(card,cellEl) {
  document.querySelectorAll('.sc').forEach(c=>c.classList.remove('picked'));
  cellEl.classList.add('picked');
  pickedSuggest={imageUrl:tcgImg(card,'high'),name:card.name,rarity:card.rarity||''};
  document.getElementById('fName').value=card.name;
  const matched=Object.entries(RAR_API_MAP).find(([k,v])=>(card.rarity||'').toLowerCase().includes(v.toLowerCase()));
  if(matched) document.getElementById('fRar').value=matched[0];
}

let srchIdx=-1;
window.onSearch = () => {
  searchQ=document.getElementById('searchQ').value.trim();
  const q=searchQ.toLowerCase(), ac=document.getElementById('searchAc'); srchIdx=-1;
  if(!q){ ac.classList.remove('show'); renderList(); return; }
  const fm=[...new Set(cards.map(c=>c.name))].filter(n=>n.toLowerCase().includes(q));
  const fd=POKEMON_ZH.filter(n=>n.includes(searchQ)&&!fm.includes(n));
  const m=[...fm,...fd].slice(0,10);
  ac.innerHTML=''; if(!m.length){ ac.classList.remove('show'); renderList(); return; }
  m.forEach(n=>{ const i=document.createElement('div'); i.className='ac-item'; i.textContent=n;
    i.onmousedown=e=>{ e.preventDefault(); document.getElementById('searchQ').value=n; searchQ=n; ac.classList.remove('show'); renderList(); }; ac.appendChild(i); });
  ac.classList.add('show'); renderList();
};
window.onSearchKd = e => {
  const ac=document.getElementById('searchAc'),items=ac.querySelectorAll('.ac-item');
  if(!ac.classList.contains('show')) return;
  if(e.key==='ArrowDown'){e.preventDefault();srchIdx=Math.min(srchIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hi',i===srchIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();srchIdx=Math.max(srchIdx-1,-1);items.forEach((el,i)=>el.classList.toggle('hi',i===srchIdx));}
  else if(e.key==='Enter'&&srchIdx>=0){e.preventDefault();const n=items[srchIdx].textContent;document.getElementById('searchQ').value=n;searchQ=n;ac.classList.remove('show');renderList();}
  else if(e.key==='Escape') ac.classList.remove('show');
};

document.getElementById('imgModalBg').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeImgModal(); });

// ══ UTILS ══
function showLoad(v){ document.getElementById('loadOv').classList.toggle('show',v); }
let toastT;
window.toast = msg=>{ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2500); };

renderDetail();
