<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTCG 卡牌管理系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f4f4f6; --bg3: #e8e8ec;
      --text: #1a1a1a; --text2: #666666; --text3: #999999;
      --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.20);
      --blue: #378ADD; --blue-dk: #185FA5; --blue-lt: #E6F1FB;
      --red: #E24B4A; --red-lt: #FCEBEB;
      --green: #3A9A4A; --green-lt: #EAF5EC;
      --radius: 8px; --radius-lg: 14px;
      --sidebar: 320px;
      --topbar: 52px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
        --text: #f2f2f7; --text2: #aeaeb2; --text3: #636366;
        --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.20);
        --blue-lt: #1a3352; --red-lt: #3a1515; --green-lt: #1a2e1f;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: var(--bg2); color: var(--text); min-height: 100vh; overflow: hidden; }

    /* ══ AUTH ══ */
    .auth-screen { display: flex; align-items: center; justify-content: center;
                   min-height: 100vh; padding: 1rem; }
    .auth-card { background: var(--bg); border-radius: var(--radius-lg);
                 border: 0.5px solid var(--border); padding: 2.5rem 2rem;
                 width: 100%; max-width: 360px; text-align: center; }
    .auth-logo { font-size: 52px; margin-bottom: 0.75rem; }
    .auth-title { font-size: 22px; font-weight: 700; margin-bottom: 0.25rem; }
    .auth-sub { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }
    .btn-google { width: 100%; padding: 12px; background: var(--bg); color: var(--text);
                  border: 0.5px solid var(--border2); border-radius: var(--radius);
                  font-size: 15px; font-weight: 500; cursor: pointer;
                  display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { background: var(--bg2); }
    .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }
    .gicon { width: 20px; height: 20px; flex-shrink: 0; }
    .auth-error { background: var(--red-lt); color: var(--red); font-size: 13px;
                  padding: 8px 12px; border-radius: var(--radius); margin-top: 1rem; display: none; }
    .auth-error.show { display: block; }
    .auth-note { font-size: 12px; color: var(--text2); margin-top: 1.25rem; line-height: 1.6; }

    /* ══ APP SHELL ══ */
    .app { display: none; flex-direction: column; height: 100vh; }
    .app.visible { display: flex; }

    /* Topbar */
    .topbar { height: var(--topbar); background: var(--bg); border-bottom: 0.5px solid var(--border);
              display: flex; align-items: center; gap: 10px; padding: 0 1.25rem; flex-shrink: 0; z-index: 40; }
    .topbar-title { font-size: 16px; font-weight: 700; flex: 1; }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .uav { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .uav-fb { width: 28px; height: 28px; border-radius: 50%; background: var(--blue);
              color: white; font-size: 12px; font-weight: 700;
              display: flex; align-items: center; justify-content: center; }
    .uname { font-size: 13px; color: var(--text2); max-width: 130px;
             overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-sm { padding: 5px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius);
              background: none; color: var(--text2); font-size: 12px; cursor: pointer; }
    .btn-sm:hover { background: var(--bg2); }
    .btn-primary { background: var(--blue); color: white; border: none; padding: 6px 14px;
                   border-radius: var(--radius); font-size: 13px; cursor: pointer; font-weight: 600; }
    .btn-primary:hover { background: var(--blue-dk); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Stats bar */
    .stats-bar { display: flex; gap: 0; border-bottom: 0.5px solid var(--border);
                 background: var(--bg); flex-shrink: 0; overflow-x: auto; }
    .stat-item { padding: 8px 20px; text-align: center; border-right: 0.5px solid var(--border); white-space: nowrap; }
    .stat-item:last-child { border-right: none; }
    .si-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
    .si-val { font-size: 18px; font-weight: 700; }

    /* ══ MAIN LAYOUT ══ */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── LEFT PANEL ── */
    .left-panel { width: var(--sidebar); flex-shrink: 0; display: flex; flex-direction: column;
                  border-right: 0.5px solid var(--border); background: var(--bg); overflow: hidden; }
    .lp-head { padding: 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .lp-head h2 { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .search-box { position: relative; margin-bottom: 8px; }
    .search-box input { width: 100%; padding: 8px 12px 8px 32px; border: 0.5px solid var(--border2);
                        border-radius: var(--radius); background: var(--bg2); color: var(--text);
                        font-size: 13px; outline: none; }
    .search-box input:focus { border-color: var(--blue); background: var(--bg); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
                   font-size: 13px; color: var(--text3); pointer-events: none; }
    .filter-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .chip { font-size: 11px; padding: 3px 9px; border: 0.5px solid var(--border2);
            border-radius: 20px; background: var(--bg); color: var(--text2);
            cursor: pointer; transition: all 0.12s; white-space: nowrap; }
    .chip.on, .chip:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
    .filter-section { margin-bottom: 8px; }
    .filter-section-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Card list */
    .card-list { flex: 1; overflow-y: auto; }
    .card-list-empty { padding: 2rem 1rem; text-align: center; color: var(--text2); font-size: 13px; }
    .card-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
                border-bottom: 0.5px solid var(--border); cursor: pointer;
                transition: background 0.12s; }
    .card-row:hover { background: var(--bg2); }
    .card-row.selected { background: var(--blue-lt); border-left: 3px solid var(--blue); }
    .card-row.selected .cr-name { color: var(--blue); }
    .cr-badge { width: 28px; height: 28px; border-radius: 50%; background: var(--blue);
                color: white; font-size: 11px; font-weight: 700;
                display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cr-info { flex: 1; min-width: 0; }
    .cr-name { font-size: 13px; font-weight: 600; white-space: nowrap;
               overflow: hidden; text-overflow: ellipsis; }
    .cr-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .cr-qty { flex-shrink: 0; }
    .qty-badge { min-width: 24px; height: 24px; border-radius: 12px; background: var(--blue);
                 color: white; font-size: 12px; font-weight: 700;
                 display: flex; align-items: center; justify-content: center; padding: 0 6px; }
    .qty-badge.zero { background: var(--bg3); color: var(--text3); }

    /* Add card button */
    .lp-foot { padding: 10px 12px; border-top: 0.5px solid var(--border); flex-shrink: 0; }
    .btn-add-card { width: 100%; padding: 9px; background: var(--blue); color: white; border: none;
                    border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-add-card:hover { background: var(--blue-dk); }

    /* ── RIGHT PANEL ── */
    .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg2); }

    /* Empty state */
    .rp-empty { flex: 1; display: flex; flex-direction: column; align-items: center;
                justify-content: center; color: var(--text2); gap: 12px; }
    .rp-empty-icon { font-size: 56px; }
    .rp-empty-text { font-size: 15px; font-weight: 500; }
    .rp-empty-sub { font-size: 13px; color: var(--text3); }

    /* Detail view */
    .rp-detail { flex: 1; overflow-y: auto; padding: 2rem; display: none; }
    .rp-detail.show { display: block; }
    .detail-card { background: var(--bg); border-radius: var(--radius-lg);
                   border: 0.5px solid var(--border); overflow: hidden; max-width: 560px; margin: 0 auto; }
    .detail-header { padding: 1.5rem; border-bottom: 0.5px solid var(--border); }
    .detail-reg { display: inline-flex; align-items: center; justify-content: center;
                  width: 36px; height: 36px; border-radius: 50%; background: var(--blue);
                  color: white; font-size: 15px; font-weight: 700; margin-bottom: 10px; }
    .detail-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .detail-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
            border-radius: 12px; font-size: 12px; font-weight: 500; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Qty control */
    .detail-qty { padding: 1.5rem; border-bottom: 0.5px solid var(--border); }
    .qty-label { font-size: 12px; color: var(--text2); margin-bottom: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .qty-control { display: flex; align-items: center; gap: 16px; }
    .qty-big-btn { width: 48px; height: 48px; border-radius: 50%;
                   border: 0.5px solid var(--border2); background: var(--bg2);
                   color: var(--text); font-size: 24px; cursor: pointer;
                   display: flex; align-items: center; justify-content: center;
                   transition: all 0.12s; font-weight: 300; }
    .qty-big-btn:hover { background: var(--bg3); border-color: var(--blue); color: var(--blue); }
    .qty-big-btn.add:hover { background: var(--blue); color: white; border-color: var(--blue); }
    .qty-big-num { font-size: 42px; font-weight: 700; min-width: 60px; text-align: center; }
    .qty-unit { font-size: 14px; color: var(--text2); }

    /* Detail fields */
    .detail-fields { padding: 1.25rem 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .df-item { }
    .df-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
    .df-val { font-size: 14px; font-weight: 500; }

    /* Detail actions */
    .detail-actions { padding: 1rem 1.5rem; display: flex; gap: 8px; border-top: 0.5px solid var(--border); }
    .btn-edit { flex: 1; padding: 9px; border: 0.5px solid var(--border2); border-radius: var(--radius);
                background: none; color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-edit:hover { background: var(--bg2); }
    .btn-del { padding: 9px 16px; border: 0.5px solid var(--red); border-radius: var(--radius);
               background: none; color: var(--red); font-size: 13px; cursor: pointer; }
    .btn-del:hover { background: var(--red-lt); }

    /* ══ MODAL ══ */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
                z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border);
             padding: 1.5rem; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; }
    .field { margin-bottom: 12px; }
    .field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
    .field input, .field select { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2);
                                   border-radius: var(--radius); background: var(--bg);
                                   color: var(--text); font-size: 14px; outline: none; }
    .field input:focus, .field select:focus { border-color: var(--blue); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel { padding: 8px 18px; border: 0.5px solid var(--border2); border-radius: var(--radius);
                  background: none; color: var(--text2); font-size: 14px; cursor: pointer; }
    .btn-save { padding: 8px 18px; background: var(--blue); color: white; border: none;
                border-radius: var(--radius); font-size: 14px; cursor: pointer; font-weight: 600; }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Autocomplete */
    .ac-wrap { position: relative; }
    .ac-list { position: absolute; top: calc(100% + 3px); left: 0; right: 0; background: var(--bg);
               border: 0.5px solid var(--border2); border-radius: var(--radius); z-index: 400;
               max-height: 200px; overflow-y: auto; box-shadow: 0 6px 20px rgba(0,0,0,0.13); display: none; }
    .ac-list.show { display: block; }
    .ac-item { padding: 8px 12px; font-size: 13px; cursor: pointer; color: var(--text);
               border-bottom: 0.5px solid var(--border); }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.hi { background: var(--blue-lt); color: var(--blue); }

    /* Reg grid */
    .reg-grid { display: grid; grid-template-columns: repeat(9,1fr); gap: 4px; margin-top: 4px; }
    .reg-cell { padding: 5px 2px; border: 0.5px solid var(--border2); border-radius: 5px;
                background: var(--bg2); color: var(--text2); font-size: 12px; font-weight: 600;
                text-align: center; cursor: pointer; transition: all 0.12s; }
    .reg-cell:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
    .reg-cell.on { background: var(--blue); color: white; border-color: var(--blue); }

    /* Toast */
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
             background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 20px;
             font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 500; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading */
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3);
                       z-index: 600; align-items: center; justify-content: center; }
    .loading-overlay.show { display: flex; }
    .loading-spinner { background: var(--bg); padding: 1.5rem 2rem; border-radius: var(--radius-lg);
                       font-size: 14px; color: var(--text2); }

    /* Mobile */
    @media (max-width: 700px) {
      body { overflow: auto; }
      .app { height: auto; overflow: auto; }
      .main { flex-direction: column; overflow: auto; }
      .left-panel { width: 100%; border-right: none; border-bottom: 0.5px solid var(--border);
                    max-height: 55vh; }
      .right-panel { min-height: 45vh; }
      .rp-detail { padding: 1rem; }
      .detail-fields { grid-template-columns: 1fr 1fr; }
      .uname { display: none; }
      .field-row { grid-template-columns: 1fr; }
      .stats-bar { display: none; }
    }
  </style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">🃏</div>
    <div class="auth-title">PTCG 卡牌管理系統</div>
    <div class="auth-sub">登入以管理你的個人卡牌收藏</div>
    <button class="btn-google" id="btnGoogle" onclick="loginGoogle()">
      <svg class="gicon" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      使用 Google 帳號登入
    </button>
    <div class="auth-error" id="authError"></div>
    <div class="auth-note">每位玩家的資料獨立保存於雲端<br>任何裝置皆可存取</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="app" id="app">

  <!-- Topbar -->
  <div class="topbar">
    <span class="topbar-title">🃏 PTCG 卡牌管理</span>
    <div class="user-info">
      <div class="uav-fb" id="uavFb"></div>
      <img class="uav" id="uav" style="display:none" alt="">
      <span class="uname" id="uname"></span>
    </div>
    <button class="btn-sm" onclick="logout()">登出</button>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Main -->
  <div class="main">

    <!-- ── LEFT PANEL ── -->
    <div class="left-panel">
      <div class="lp-head">
        <h2>搜尋卡牌</h2>
        <!-- Search -->
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchQ" placeholder="輸入卡牌名稱..." autocomplete="off"
            oninput="onSearchInput()" onkeydown="onSearchKeydown(event)">
          <div class="ac-list" id="searchAcList"></div>
        </div>
        <!-- Filters -->
        <div class="filter-section">
          <div class="filter-section-label">卡牌種類</div>
          <div class="filter-chips" id="chipCat"></div>
        </div>
        <div class="filter-section" id="chipTypeSection">
          <div class="filter-section-label">屬性</div>
          <div class="filter-chips" id="chipType"></div>
        </div>
        <div class="filter-section">
          <div class="filter-section-label">稀有度</div>
          <div class="filter-chips" id="chipRarity"></div>
        </div>
      </div>

      <!-- Card list -->
      <div class="card-list" id="cardList"></div>

      <!-- Add button -->
      <div class="lp-foot">
        <button class="btn-add-card" onclick="openAddModal()">＋ 新增卡牌到收藏</button>
      </div>
    </div>

    <!-- ── RIGHT PANEL ── -->
    <div class="right-panel">
      <!-- Empty -->
      <div class="rp-empty" id="rpEmpty">
        <div class="rp-empty-icon">👈</div>
        <div class="rp-empty-text">從左側選擇一張卡牌</div>
        <div class="rp-empty-sub">可搜尋名稱或依類別篩選</div>
      </div>
      <!-- Detail -->
      <div class="rp-detail" id="rpDetail">
        <div class="detail-card">
          <div class="detail-header">
            <div class="detail-reg" id="dReg"></div>
            <div class="detail-name" id="dName"></div>
            <div class="detail-pills" id="dPills"></div>
          </div>
          <div class="detail-qty">
            <div class="qty-label">擁有張數</div>
            <div class="qty-control">
              <button class="qty-big-btn" onclick="adjustQty(-1)">−</button>
              <div class="qty-big-num" id="dQty">0</div>
              <button class="qty-big-btn add" onclick="adjustQty(1)">＋</button>
              <span class="qty-unit">張</span>
            </div>
          </div>
          <div class="detail-fields" id="dFields"></div>
          <div class="detail-actions">
            <button class="btn-edit" onclick="openEditModal()">✎ 編輯卡牌資訊</button>
            <button class="btn-del" onclick="deleteSelected()">刪除</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ ADD / EDIT MODAL ══ -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">新增卡牌</h3>
    <!-- 賽場標誌 -->
    <div class="field">
      <label>賽場標誌 — 目前選擇：<strong id="regLabel" style="color:var(--blue)">A</strong></label>
      <div class="reg-grid" id="regGrid"></div>
    </div>
    <!-- 名稱 -->
    <div class="field">
      <label>名稱</label>
      <div class="ac-wrap">
        <input type="text" id="fName" placeholder="例：皮卡丘 ex" autocomplete="off"
          oninput="onNameAcInput()" onkeydown="onNameAcKeydown(event)">
        <div class="ac-list" id="nameAcList"></div>
      </div>
    </div>
    <!-- 類別 + 屬性 -->
    <div class="field-row">
      <div class="field">
        <label>類別</label>
        <select id="fCat" onchange="onCatChange()">
          <option>寶可夢</option><option>支援者</option><option>物品</option><option>道具</option><option>能量</option>
        </select>
      </div>
      <div class="field" id="fTypeWrap">
        <label>屬性</label>
        <div class="ac-wrap">
          <input type="text" id="fType" placeholder="選擇屬性..." autocomplete="off" readonly
            onfocus="onTypeAcFocus()" onkeydown="onTypeAcKeydown(event)">
          <div class="ac-list" id="typeAcList"></div>
        </div>
      </div>
    </div>
    <!-- 稀有度 -->
    <div class="field">
      <label>稀有度</label>
      <select id="fRarity">

// ══ Auth ══
onAuthStateChanged(auth, u => {
  if (u) {
    user = u;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    if (u.photoURL) {
      document.getElementById('uav').src = u.photoURL;
      document.getElementById('uav').style.display = 'block';
      document.getElementById('uavFb').style.display = 'none';

    loadCards();

window.loginGoogle = async () => {
  const btn = document.getElementById('btnGoogle');
  btn.disabled = true; btn.textContent = '登入中...';

  catch(e) {
    const el = document.getElementById('authError');
    el.textContent = e.code==='auth/popup-closed-by-user' ? '視窗已關閉，請再試' : '登入失敗，請再試';

window.logout = () => signOut(auth);

// ══ Firestore ══
const ref = () => collection(db, 'users', user.uid, 'cards');

async function loadCards() {
  showLoading(true);
  try {
    const snap = await getDocs(ref());
    cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { toast('❌ 載入失敗'); }
  showLoading(false);
  renderAll();
}

// ══ Filters ══
function buildChips() {
  // Cat
  const cc = document.getElementById('chipCat');
  cc.innerHTML = '';
  CATS.forEach(c => {
    const el = document.createElement('div');
    el.className = 'chip' + (filterCat===c?' on':'');
    el.textContent = c;
    el.onclick = () => { filterCat = filterCat===c ? '' : c; if(filterCat!=='寶可夢') filterType=''; buildChips(); renderList(); };
    cc.appendChild(el);
  });
  // Type (only show if cat is 寶可夢 or no filter)
  const ts = document.getElementById('chipTypeSection');
  ts.style.display = (filterCat===''||filterCat==='寶可夢') ? '' : 'none';
  const tc = document.getElementById('chipType');
  tc.innerHTML = '';
  TYPES.forEach(t => {
    const el = document.createElement('div');
    el.className = 'chip' + (filterType===t?' on':'');
    el.textContent = t;
    el.onclick = () => { filterType = filterType===t ? '' : t; buildChips(); renderList(); };
    tc.appendChild(el);
  });
  // Rarity
  const rc = document.getElementById('chipRarity');
  rc.innerHTML = '';
  RARITIES.forEach(r => {
    const el = document.createElement('div');
    el.className = 'chip' + (filterRarity===r?' on':'');
    el.textContent = r;
    el.onclick = () => { filterRarity = filterRarity===r ? '' : r; buildChips(); renderList(); };
    rc.appendChild(el);
  });
}

function getFiltered() {
  const q = searchQ.toLowerCase();
  return cards.filter(c => {
    if (filterCat && c.cat !== filterCat) return false;
    if (filterType && c.type !== filterType) return false;
    if (filterRarity && c.rarity !== filterRarity) return false;
    if (q && !c.name.toLowerCase().includes(q) && !c.reg.toLowerCase().includes(q)) return false;
    return true;
  });
}

// ══ Render ══
function renderAll() { buildChips(); renderList(); renderStats(); }

function renderList() {
  const list = document.getElementById('cardList');
  const filtered = getFiltered();
  if (!filtered.length) {
    list.innerHTML = `<div class="card-list-empty">${cards.length ? '沒有符合條件的卡牌' : '尚無卡牌，點下方新增'}</div>`;
    return;
  }
  list.innerHTML = '';
  filtered.forEach(c => {
    const row = document.createElement('div');
    row.className = 'card-row' + (c.id===selectedId?' selected':'');
    row.onclick = () => selectCard(c.id);
    const cc = CAT_CFG[c.cat]||{bg:'#eee',color:'#333'};
    const metaParts = [c.cat];
    if (c.type) metaParts.push(c.type);
    metaParts.push(c.rarity||'');
    row.innerHTML = `
      <div class="cr-badge">${c.reg}</div>
      <div class="cr-info">
        <div class="cr-name">${c.name}</div>
        <div class="cr-meta">${metaParts.filter(Boolean).join(' · ')}</div>
      </div>
      <div class="cr-qty">
        <div class="qty-badge${c.qty>0?'':' zero'}">${c.qty}</div>
      </div>`;
    list.appendChild(row);
  });
}

function renderStats() {
  const total = cards.reduce((s,c)=>s+c.qty,0);
  const rare  = cards.filter(c=>['★ AR (Art Rare)','★★ SAR (Special Art Rare)','★★★ UR (Ultra Rare)','★★★★ SR (Super Rare)'].includes(c.rarity)).length;
  document.getElementById('statsBar').innerHTML = [
    ['種類', cards.length],
    ['總張數', total],
    ['寶可夢', cards.filter(c=>c.cat==='寶可夢').length],
    ['訓練家', cards.filter(c=>['支援者','物品','道具'].includes(c.cat)).length],
    ['高稀有', rare],
  ].map(([l,v])=>`<div class="stat-item"><div class="si-label">${l}</div><div class="si-val">${v}</div></div>`).join('');
}

function selectCard(id) {
  selectedId = id;
  renderList();
  renderDetail();
}

function renderDetail() {
  const c = cards.find(x=>x.id===selectedId);
  document.getElementById('rpEmpty').style.display  = c ? 'none' : 'flex';
  document.getElementById('rpDetail').classList.toggle('show', !!c);
  if (!c) return;

  document.getElementById('dReg').textContent  = c.reg;
  document.getElementById('dName').textContent = c.name;
  document.getElementById('dQty').textContent  = c.qty;

  // Pills
  const pills = document.getElementById('dPills');
  pills.innerHTML = '';
  const cc = CAT_CFG[c.cat]||{bg:'#eee',color:'#333'};
  pills.innerHTML += `<span class="pill" style="background:${cc.bg};color:${cc.color}">${c.cat}</span>`;
  if (c.type) {
    const tc = TYPE_CFG[c.type]||TYPE_CFG['一般'];
    pills.innerHTML += `<span class="pill" style="background:${tc.bg};color:${tc.color}"><span class="dot" style="background:${tc.dot}"></span>${c.type}</span>`;
  }
  if (c.rarity) {
    const rc = RAR_CFG[c.rarity]||{bg:'#eee',color:'#333'};
    pills.innerHTML += `<span class="pill" style="background:${rc.bg};color:${rc.color}">${c.rarity}</span>`;
  }

  // Fields
  document.getElementById('dFields').innerHTML = [
    ['賽場標誌', c.reg],
    ['類別', c.cat],
    ['屬性', c.type||'—'],
    ['稀有度', c.rarity||'—'],
  ].map(([l,v])=>`<div class="df-item"><div class="df-label">${l}</div><div class="df-val">${v}</div></div>`).join('');
}

// ══ Qty adjust ══
window.adjustQty = async (delta) => {
  const c = cards.find(x=>x.id===selectedId); if (!c) return;
  const qty = Math.max(0, c.qty + delta);
  try {
    await updateDoc(doc(db,'users',user.uid,'cards',selectedId),{qty});
    c.qty = qty; renderList(); renderDetail(); renderStats();
  } catch(e) { toast('❌ 更新失敗'); }
};

// ══ Delete ══
window.deleteSelected = async () => {
  const c = cards.find(x=>x.id===selectedId); if (!c) return;
  if (!confirm(`確定要從收藏中刪除「${c.name}」嗎？`)) return;
  try {
    await deleteDoc(doc(db,'users',user.uid,'cards',selectedId));
    cards = cards.filter(x=>x.id!==selectedId);
    selectedId = null; renderAll(); renderDetail();
    toast('已刪除');
  } catch(e) { toast('❌ 刪除失敗'); }
};

// ══ Modal ══
window.openAddModal = () => {
  editId = null; selectedReg = 'A';
  document.getElementById('modalTitle').textContent = '新增卡牌';
  document.getElementById('fName').value   = '';
  document.getElementById('fCat').value    = '寶可夢';
  document.getElementById('fType').value   = '一般';
  document.getElementById('fRarity').value = '◆ C (Common)';
  document.getElementById('fTypeWrap').style.display = '';
  initRegGrid(); updateRegLabel();
  document.getElementById('modalBg').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 100);
};

window.openEditModal = () => {
  const c = cards.find(x=>x.id===selectedId); if (!c) return;
  editId = selectedId; selectedReg = c.reg;
  document.getElementById('modalTitle').textContent = '編輯卡牌';
  document.getElementById('fName').value   = c.name;
  document.getElementById('fCat').value    = c.cat;
  document.getElementById('fType').value   = c.type || '一般';
  document.getElementById('fRarity').value = c.rarity || '◆ C (Common)';
  document.getElementById('fTypeWrap').style.display = c.cat==='寶可夢' ? '' : 'none';
  initRegGrid(); updateRegLabel();
  document.getElementById('modalBg').classList.add('open');
};

window.closeModal = () => {
  document.getElementById('modalBg').classList.remove('open');
  document.getElementById('nameAcList').classList.remove('show');
  document.getElementById('typeAcList').classList.remove('show');
};

window.onCatChange = () => {
  const isPokemon = document.getElementById('fCat').value === '寶可夢';
  document.getElementById('fTypeWrap').style.display = isPokemon ? '' : 'none';
  if (!isPokemon) document.getElementById('fType').value = '一般';
};

window.saveCard = async () => {
  const btn  = document.getElementById('btnSave');
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('請輸入卡牌名稱'); return; }
  const cat  = document.getElementById('fCat').value;
  const data = {
    reg:    selectedReg,
    name,
    cat,
    type:   cat==='寶可夢' ? document.getElementById('fType').value : '',
    rarity: document.getElementById('fRarity').value,
    qty:    editId ? cards.find(x=>x.id===editId)?.qty||0 : 0,
  };
  btn.disabled = true; btn.textContent = '儲存中...';
  try {
    if (editId) {
      await updateDoc(doc(db,'users',user.uid,'cards',editId), data);
      Object.assign(cards.find(x=>x.id===editId), data);
      selectedId = editId; toast('✅ 已更新');
    } else {
      const r = await addDoc(ref(), {...data, createdAt: serverTimestamp()});
      const newCard = {id: r.id, ...data};
      cards.push(newCard); selectedId = r.id; toast('✅ 已新增：' + name);
    }
    closeModal(); renderAll(); renderDetail();
  } catch(e) { toast('❌ 儲存失敗'); }
  btn.disabled = false; btn.textContent = '儲存';
};

// ══ Reg Grid ══
function initRegGrid() {
  const grid = document.getElementById('regGrid');
  grid.innerHTML = '';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
    const cell = document.createElement('div');
    cell.className = 'reg-cell' + (l===selectedReg?' on':'');
    cell.textContent = l;
    cell.onclick = () => { selectedReg = l; initRegGrid(); updateRegLabel(); };
    grid.appendChild(cell);
  });
}
function updateRegLabel() {
  document.getElementById('regLabel').textContent = selectedReg;
}

// ══ Search Autocomplete ══
let searchAcIdx = -1;
window.onSearchInput = () => {
  searchQ = document.getElementById('searchQ').value.trim();
  const q = searchQ.toLowerCase();
  searchAcIdx = -1;
  const list = document.getElementById('searchAcList');
  if (!q) { list.classList.remove('show'); renderList(); return; }
  const fromCards = [...new Set(cards.map(c=>c.name))].filter(n=>n.toLowerCase().includes(q));
  const fromDB    = POKEMON_ZH.filter(n=>n.includes(searchQ)&&!fromCards.includes(n));
  const matches   = [...fromCards,...fromDB].slice(0,10);
  list.innerHTML  = '';
  if (!matches.length) { list.classList.remove('show'); renderList(); return; }
  matches.forEach(name => {
    const item = document.createElement('div');
    item.className = 'ac-item'; item.textContent = name;
    item.onmousedown = e => { e.preventDefault(); document.getElementById('searchQ').value=name; searchQ=name; list.classList.remove('show'); renderList(); };
    list.appendChild(item);
  });
  list.classList.add('show');
  renderList();
};
window.onSearchKeydown = e => {
  const list = document.getElementById('searchAcList');
  const items = list.querySelectorAll('.ac-item');
  if (!list.classList.contains('show')) return;
  if (e.key==='ArrowDown') { e.preventDefault(); searchAcIdx=Math.min(searchAcIdx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('hi',i===searchAcIdx)); }
  else if (e.key==='ArrowUp') { e.preventDefault(); searchAcIdx=Math.max(searchAcIdx-1,-1); items.forEach((el,i)=>el.classList.toggle('hi',i===searchAcIdx)); }
  else if (e.key==='Enter'&&searchAcIdx>=0) { e.preventDefault(); const n=items[searchAcIdx].textContent; document.getElementById('searchQ').value=n; searchQ=n; list.classList.remove('show'); renderList(); }
  else if (e.key==='Escape') list.classList.remove('show');
};

// ══ Name Autocomplete (in modal) ══
let nameAcIdx = -1;
window.onNameAcInput = () => {
  const val = document.getElementById('fName').value.trim();
  const list = document.getElementById('nameAcList');
  nameAcIdx = -1;
  if (!val) { list.classList.remove('show'); return; }
  const q = val.toLowerCase();
  const fromCards = [...new Set(cards.map(c=>c.name))].filter(n=>n.toLowerCase().includes(q));
  const fromDB    = POKEMON_ZH.filter(n=>n.includes(val)&&!fromCards.includes(n));
  const matches   = [...fromCards,...fromDB].slice(0,10);
  list.innerHTML  = '';
  if (!matches.length) { list.classList.remove('show'); return; }
  matches.forEach(name => {
    const item = document.createElement('div');
    item.className='ac-item'; item.textContent=name;
    item.onmousedown = e => { e.preventDefault(); document.getElementById('fName').value=name; list.classList.remove('show'); };
    list.appendChild(item);
  });
  list.classList.add('show');
};
window.onNameAcKeydown = e => {
  const list  = document.getElementById('nameAcList');
  const items = list.querySelectorAll('.ac-item');
  if (!list.classList.contains('show')) return;
  if (e.key==='ArrowDown') { e.preventDefault(); nameAcIdx=Math.min(nameAcIdx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('hi',i===nameAcIdx)); }
  else if (e.key==='ArrowUp') { e.preventDefault(); nameAcIdx=Math.max(nameAcIdx-1,-1); items.forEach((el,i)=>el.classList.toggle('hi',i===nameAcIdx)); }
  else if (e.key==='Enter'&&nameAcIdx>=0) { e.preventDefault(); document.getElementById('fName').value=items[nameAcIdx].textContent; list.classList.remove('show'); }
  else if (e.key==='Escape') list.classList.remove('show');
};

// ══ Type Autocomplete (in modal) ══
let typeAcIdx = -1;
window.onTypeAcFocus = () => showTypeAc('');
window.onTypeAcKeydown = e => {
  const list  = document.getElementById('typeAcList');
  const items = list.querySelectorAll('.ac-item');
  if (!list.classList.contains('show')&&e.key==='ArrowDown') { showTypeAc(''); return; }
  if (e.key==='ArrowDown') { e.preventDefault(); typeAcIdx=Math.min(typeAcIdx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('hi',i===typeAcIdx)); }
  else if (e.key==='ArrowUp') { e.preventDefault(); typeAcIdx=Math.max(typeAcIdx-1,-1); items.forEach((el,i)=>el.classList.toggle('hi',i===typeAcIdx)); }
  else if (e.key==='Enter'&&typeAcIdx>=0) { e.preventDefault(); document.getElementById('fType').value=items[typeAcIdx].textContent; list.classList.remove('show'); }
  else if (e.key==='Escape') list.classList.remove('show');
};
function showTypeAc(q) {
  const list = document.getElementById('typeAcList');
  typeAcIdx = -1;
  const matches = q ? TYPES.filter(t=>t.includes(q)) : TYPES;
  list.innerHTML = '';
  matches.forEach(t => {
    const item = document.createElement('div');
    item.className='ac-item'; item.textContent=t;
    item.onmousedown = e => { e.preventDefault(); document.getElementById('fType').value=t; list.classList.remove('show'); };
    list.appendChild(item);
  });
  list.classList.add('show');
}

// ══ Global click to close autocomplete ══
document.addEventListener('click', e => {
  if (!e.target.closest('.search-box'))  document.getElementById('searchAcList').classList.remove('show');
  if (!e.target.closest('#fName')&&!e.target.closest('#nameAcList')) document.getElementById('nameAcList').classList.remove('show');
  if (!e.target.closest('#fTypeWrap'))   document.getElementById('typeAcList').classList.remove('show');
});

// ══ Keyboard ══
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
document.getElementById('modalBg').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });

// ══ Utils ══
function showLoading(v) { document.getElementById('loadingOverlay').classList.toggle('show', v); }
let toastTimer;
window.toast = msg => {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
};

// Boot
renderDetail();
</script>
</body>
</html>
